name: Llamenos

options:
  bundleIdPrefix: org.llamenos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: false
  groupSortPosition: bottom

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: KN6NH935ZU
    CODE_SIGN_STYLE: Automatic
    # The Rust XCFramework is only built for arm64 simulator slices.
    # Exclude x86_64 so Release builds on Apple Silicon Macs link cleanly.
    "EXCLUDED_ARCHS[sdk=iphonesimulator*]": x86_64

targets:
  # ─── Main Application ───────────────────────────────────────
  Llamenos:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../../packages/protocol/generated/swift
        name: Generated
        buildPhase: sources
      - path: Resources/Localizable
      - path: Resources/Assets.xcassets
      - path: Resources/Fonts
    dependencies:
      - framework: LlamenosCoreFFI.xcframework
        embed: false
    info:
      path: Sources/App/Info.plist
      properties:
        UIDesignRequiresCompatibility: true
        UILaunchScreen: {}
        # NOTE (App Store v1): `voip` UIBackgroundMode is intentionally NOT declared.
        # iOS 13+ requires apps with `voip` mode to register PKPushRegistry and
        # immediately invoke CXProvider.reportNewIncomingCall on every PushKit push;
        # non-compliant apps are terminated and have PushKit delivery blocked by iOS.
        # The Llamenos PushKit/CallKit integration is gated on the Linphone SDK
        # (apps/ios/Frameworks/linphone-sdk.xcframework) being linked AND verified
        # end-to-end on a real device. Until then, incoming-call notifications use
        # the standard APNs path (remote-notification + UNUserNotification).
        # Re-add `voip` when PushKit is registered and CallKit reporting is wired.
        UIBackgroundModes:
          - remote-notification
          - audio
        CFBundleURLTypes:
          - CFBundleURLName: org.llamenos.hotline
            CFBundleURLSchemes:
              - llamenos
        ITSAppUsesNonExemptEncryption: true
        NSMicrophoneUsageDescription: Llamenos uses the microphone for VoIP calls and voice-to-text input when filling out report fields.
        NSSpeechRecognitionUsageDescription: Llamenos uses speech recognition to transcribe voice input into report fields.
        NSLocationWhenInUseUsageDescription: Llamenos uses your location to autofill location fields in reports, with your permission.
        NSCameraUsageDescription: Llamenos uses the camera to scan QR codes when linking a new device to your account.
        NSFaceIDUsageDescription: Llamenos uses Face ID to unlock the app and protect your encrypted reports.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.llamenos.hotline
        INFOPLIST_FILE: Sources/App/Info.plist
        GENERATE_INFOPLIST_FILE: false
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: Sources/App/Llamenos.Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: Sources/App/Llamenos.Release.entitlements
    scheme:
      testTargets:
        - LlamenosTests
        - LlamenosUITests
      gatherCoverageData: true
      coverageTargets:
        - Llamenos

  # ─── Unit Tests ──────────────────────────────────────────────
  LlamenosTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Unit
    dependencies:
      - target: Llamenos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.llamenos.hotline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Llamenos.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Llamenos"
        BUNDLE_LOADER: "$(TEST_HOST)"

  # ─── UI Tests ────────────────────────────────────────────────
  LlamenosUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI
    dependencies:
      - target: Llamenos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.llamenos.hotline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: Llamenos
