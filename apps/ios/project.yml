name: Llamenos

options:
  bundleIdPrefix: org.llamenos
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: false
  groupSortPosition: bottom

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual

targets:
  # ─── Main Application ───────────────────────────────────────
  Llamenos:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../../packages/protocol/generated/swift
        name: Generated
        buildPhase: sources
      - path: Resources/Localizable
      - path: Resources/Assets.xcassets
      - path: Resources/Fonts
    dependencies:
      - framework: LlamenosCoreFFI.xcframework
        embed: false
    info:
      path: Sources/App/Info.plist
      properties:
        UIDesignRequiresCompatibility: true
        UILaunchScreen: {}
        UIBackgroundModes:
          - remote-notification
          - voip
          - audio
        CFBundleURLTypes:
          - CFBundleURLName: org.llamenos.hotline
            CFBundleURLSchemes:
              - llamenos
        NSMicrophoneUsageDescription: Llamenos uses the microphone for voice-to-text input when filling out report fields.
        NSSpeechRecognitionUsageDescription: Llamenos uses speech recognition to transcribe voice input into report fields.
        NSLocationWhenInUseUsageDescription: Llamenos uses your location to autofill location fields in reports, with your permission.
    entitlements:
      path: Sources/App/Llamenos.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.llamenos.hotline
        INFOPLIST_FILE: Sources/App/Info.plist
        GENERATE_INFOPLIST_FILE: false
        CODE_SIGN_ENTITLEMENTS: Sources/App/Llamenos.entitlements
    scheme:
      testTargets:
        - LlamenosTests
        - LlamenosUITests
      gatherCoverageData: true
      coverageTargets:
        - Llamenos

  # ─── Unit Tests ──────────────────────────────────────────────
  LlamenosTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/Unit
    dependencies:
      - target: Llamenos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.llamenos.hotline.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Llamenos.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Llamenos"
        BUNDLE_LOADER: "$(TEST_HOST)"

  # ─── UI Tests ────────────────────────────────────────────────
  LlamenosUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/UI
    dependencies:
      - target: Llamenos
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.llamenos.hotline.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_TARGET_NAME: Llamenos
