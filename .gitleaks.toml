# Gitleaks configuration — allowlist for false positives.
# See: https://github.com/gitleaks/gitleaks#configuration

[extend]
useDefault = true

[allowlist]
description = "Documentation examples and development-only credential defaults"

# Translated deployment docs contain placeholder/example credentials
paths = [
  '''site/src/content/docs/.*/deploy.*\.md$''',
  '''site/src/content/docs/.*/setup.*\.md$''',
  '''\.env\.example$''',
]

# Dev-only credential defaults in Docker Compose configs (not used in production)
regexes = [
  # RustFS local dev default — mirrors docker-compose.dev.yml RUSTFS_*_KEY values
  '''(STORAGE|RUSTFS)_(ACCESS|SECRET)_KEY\s*[:=]\s*rustfsadmin''',
  # MinIO local dev default — standard minioadmin default, no production use
  '''MINIO_(ACCESS|SECRET)_KEY\s*[:=]\s*minioadmin''',
]
