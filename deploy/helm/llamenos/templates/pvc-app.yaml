{{- if .Values.app.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "llamenos.fullname" . }}-data
  labels:
    {{- include "llamenos.labels" . | nindent 4 }}
    app.kubernetes.io/component: app
spec:
  accessModes:
    {{- range .Values.app.persistence.accessModes }}
    - {{ . }}
    {{- end }}
  {{- if .Values.app.persistence.storageClass }}
  storageClassName: {{ .Values.app.persistence.storageClass | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.app.persistence.size }}
{{- end }}
