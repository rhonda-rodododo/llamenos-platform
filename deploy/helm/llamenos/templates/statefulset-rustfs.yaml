{{- if .Values.rustfs.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "llamenos.fullname" . }}-rustfs
  labels:
    {{- include "llamenos.labels" . | nindent 4 }}
    app.kubernetes.io/component: rustfs
spec:
  serviceName: {{ include "llamenos.fullname" . }}-rustfs
  replicas: 1
  selector:
    matchLabels:
      {{- include "llamenos.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: rustfs
  template:
    metadata:
      labels:
        {{- include "llamenos.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: rustfs
    spec:
      containers:
        - name: rustfs
          image: "{{ .Values.rustfs.image.repository }}:{{ .Values.rustfs.image.tag }}"
          args: ["server", "/data"]
          ports:
            - containerPort: 9000
              name: api
          env:
            - name: RUSTFS_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "llamenos.secretName" . }}
                  key: rustfs-access-key
            - name: RUSTFS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "llamenos.secretName" . }}
                  key: rustfs-secret-key
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
          {{- with .Values.rustfs.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "llamenos.labels" . | nindent 10 }}
          app.kubernetes.io/component: rustfs
      spec:
        accessModes:
          - ReadWriteOnce
        {{- if .Values.rustfs.persistence.storageClass }}
        storageClassName: {{ .Values.rustfs.persistence.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.rustfs.persistence.size }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "llamenos.fullname" . }}-rustfs
  labels:
    {{- include "llamenos.labels" . | nindent 4 }}
    app.kubernetes.io/component: rustfs
spec:
  type: ClusterIP
  ports:
    - port: 9000
      targetPort: api
      name: api
  selector:
    {{- include "llamenos.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: rustfs
{{- end }}
