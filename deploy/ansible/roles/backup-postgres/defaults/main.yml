---
# PostgreSQL backup defaults

# Base backup directory
backup_base_dir: "{{ app_dir }}/backups"
backup_postgres_dir: "{{ backup_base_dir }}/postgres"

# pg_dump options
backup_postgres_format: custom          # custom (compressed), plain, directory
backup_postgres_jobs: 2                 # parallel dump jobs (directory format only)
backup_postgres_compress: 9             # compression level (0-9)
backup_postgres_exclude_tables: []      # tables to skip (e.g., sessions, cache)

# WAL archiving (continuous archiving for PITR)
backup_postgres_wal_enabled: false
backup_postgres_wal_dir: "{{ backup_base_dir }}/postgres-wal"

# Retention policy
backup_postgres_retain_daily: 7
backup_postgres_retain_weekly: 4
backup_postgres_retain_monthly: 3

# Encryption
backup_age_public_key: ""               # age recipient key for encryption

# Remote storage via rclone
backup_rclone_remote: ""                # e.g., "s3:llamenos-backups/postgres"

# Docker compose file path
backup_compose_file: "{{ app_dir }}/docker-compose.yml"

# Database credentials
backup_postgres_user: llamenos
backup_postgres_db: llamenos
