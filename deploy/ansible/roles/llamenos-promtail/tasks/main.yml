---
# Promtail role
#
# Deploys Promtail to ship Docker container logs and system logs to Loki.
# Mounts the Docker socket (read-only) to auto-discover container labels.

- name: Create Promtail directory
  ansible.builtin.file:
    path: "{{ app_dir }}/observability/promtail"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Template Promtail config
  ansible.builtin.template:
    src: promtail-config.yml.j2
    dest: "{{ app_dir }}/observability/promtail/promtail-config.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart promtail

- name: Template Promtail docker-compose.yml
  ansible.builtin.template:
    src: ../../../templates/compose/promtail.j2
    dest: "{{ app_dir }}/observability/promtail/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart promtail

- name: Start Promtail
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}/observability/promtail"
    state: present
