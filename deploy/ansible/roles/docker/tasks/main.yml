---
# Docker role
#
# Installs Docker CE from the official repository with security hardening:
# - User namespace remapping (isolates container UIDs from host)
# - Default no-new-privileges (prevents privilege escalation in containers)
# - Logging configuration with rotation
# - Deploy user added to docker group

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
    state: present

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    owner: root
    group: root

- name: Get system architecture
  ansible.builtin.command: dpkg --print-architecture
  register: dpkg_arch
  changed_when: false

- name: Get Ubuntu codename
  ansible.builtin.command: lsb_release -cs
  register: ubuntu_codename
  changed_when: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ dpkg_arch.stdout }} signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/ubuntu {{ ubuntu_codename.stdout }} stable
    filename: docker
    state: present

- name: Install Docker CE
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Create Docker configuration directory
  ansible.builtin.file:
    path: /etc/docker
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Configure Docker daemon for production
  ansible.builtin.template:
    src: docker-daemon.json.j2
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify: Restart docker

- name: Verify Docker restart policies on all containers
  ansible.builtin.shell: |
    docker ps -a --format '{{ '{{' }}.Names{{ '}}' }}:{{ '{{' }}.Status{{ '}}' }}' | \
      while IFS=: read name status; do
        policy=$(docker inspect --format '{{ '{{' }}.HostConfig.RestartPolicy.Name{{ '}}' }}' "$name" 2>/dev/null)
        if [ "$policy" != "unless-stopped" ] && [ "$policy" != "always" ]; then
          echo "WARNING: $name has restart policy: $policy"
        fi
      done
  register: restart_policy_check
  changed_when: false
  failed_when: false

- name: Create userns-remap subordinate UID mapping
  ansible.builtin.copy:
    dest: /etc/subuid
    owner: root
    group: root
    mode: "0644"
    content: |
      dockremap:100000:65536
      {{ deploy_user }}:200000:65536
  when: docker_userns_remap

- name: Create userns-remap subordinate GID mapping
  ansible.builtin.copy:
    dest: /etc/subgid
    owner: root
    group: root
    mode: "0644"
    content: |
      dockremap:100000:65536
      {{ deploy_user }}:200000:65536
  when: docker_userns_remap

- name: Add deploy user to docker group
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Enable containerd
  ansible.builtin.systemd:
    name: containerd
    enabled: true
    state: started

- name: Verify Docker is running
  ansible.builtin.command: docker info
  changed_when: false
