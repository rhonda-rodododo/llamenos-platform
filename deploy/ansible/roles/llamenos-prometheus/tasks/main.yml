---
# Prometheus role
#
# Deploys Prometheus server with auto-generated scrape configuration derived
# from inventory. Scrapes: app (/api/metrics), node-exporter, caddy, postgres
# exporter, and any additional targets defined in vars.
# Alert rules are templated alongside the config.

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ app_dir }}/observability/prometheus/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"
  loop:
    - ""
    - data
    - rules

- name: Template prometheus.yml config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ app_dir }}/observability/prometheus/prometheus.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart prometheus

- name: Template alert rules
  ansible.builtin.template:
    src: alert-rules.yml.j2
    dest: "{{ app_dir }}/observability/prometheus/rules/llamenos.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart prometheus

- name: Template Prometheus docker-compose.yml
  ansible.builtin.template:
    src: ../../../templates/compose/prometheus.j2
    dest: "{{ app_dir }}/observability/prometheus/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart prometheus

- name: Start Prometheus
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}/observability/prometheus"
    state: present
