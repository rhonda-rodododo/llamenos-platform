---
# RustFS backup role
#
# Mirrors all objects from the RustFS buckets using rclone:
# - Archives as compressed tarball
# - Optional age encryption
# - Retention policy (daily/weekly/monthly)
# - Optional rclone upload
# - Manifest logging with SHA-256 checksums and object counts

- name: Install age encryption tool
  ansible.builtin.apt:
    name: age
    state: present

- name: Create RustFS backup directories
  ansible.builtin.file:
    path: "{{ backup_rustfs_dir }}/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0700"
  loop:
    - daily
    - weekly
    - monthly

- name: Template RustFS backup script
  ansible.builtin.template:
    src: backup-rustfs.sh.j2
    dest: "{{ app_dir }}/scripts/backup-rustfs.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Run initial RustFS backup
  ansible.builtin.command: "{{ app_dir }}/scripts/backup-rustfs.sh --manifest"
  become_user: "{{ deploy_user }}"
  register: initial_rustfs_backup
  changed_when: "'Backup complete' in initial_rustfs_backup.stdout"
  ignore_errors: true

- name: Display initial backup result
  ansible.builtin.debug:
    msg: "{{ initial_rustfs_backup.stdout_lines | default(['No output']) }}"
  when: initial_rustfs_backup is defined
