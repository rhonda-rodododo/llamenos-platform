---
# RustFS backup defaults

backup_base_dir: "{{ app_dir }}/backups"
backup_rustfs_dir: "{{ backup_base_dir }}/rustfs"

# RustFS connection (uses mc CLI inside the rustfs container)
backup_rustfs_container: llamenos-rustfs-1
backup_rustfs_bucket: llamenos-files
backup_rustfs_alias: local               # mc alias name

# mc mirror options
backup_rustfs_remove_deleted: false       # mirror --remove (sync deletes)
backup_rustfs_overwrite: false            # mirror --overwrite (re-copy changed)

# Retention policy
backup_rustfs_retain_daily: 7
backup_rustfs_retain_weekly: 4
backup_rustfs_retain_monthly: 3

# Encryption
backup_age_public_key: ""

# Remote storage via rclone
backup_rclone_remote: ""

# Docker compose file path
backup_compose_file: "{{ app_dir }}/docker-compose.yml"
