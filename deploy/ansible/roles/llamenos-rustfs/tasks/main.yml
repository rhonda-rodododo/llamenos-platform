---
# RustFS object storage role — deploys the S3-compatible blob store
#
# Skips if:
#   - llamenos_rustfs_enabled is false
#   - This host is not in the llamenos_storage group (when the group has members)

- name: Skip if rustfs not enabled
  ansible.builtin.meta: end_play
  when: not (llamenos_rustfs_enabled | default(true))

- name: Skip if not assigned to this host
  ansible.builtin.meta: end_play
  when: >
    groups.get('llamenos_storage', []) | length > 0 and
    inventory_hostname not in groups.get('llamenos_storage', [])

- name: Create rustfs service directory
  ansible.builtin.file:
    path: "{{ app_dir }}/services/rustfs"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Template rustfs compose file
  ansible.builtin.template:
    src: compose/rustfs.j2
    dest: "{{ app_dir }}/services/rustfs/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart rustfs service

- name: Template rustfs environment
  ansible.builtin.template:
    src: env/rustfs.j2
    dest: "{{ app_dir }}/services/rustfs/.env.rustfs"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0600"
  notify: Restart rustfs service

- name: Pull rustfs image
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}/services/rustfs"
    pull: always
    state: present
    recreate: never

- name: Start rustfs service
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}/services/rustfs"
    state: present
  register: rustfs_compose
