---
# DEPRECATED: This monolithic deployment role is kept for backward compatibility.
# New deployments should use per-service roles (llamenos-app, llamenos-postgres, etc.)
# with the multi-host inventory and orchestration playbook.
#
# To migrate: ansible-playbook playbooks/migrate-to-multi-host.yml --ask-vault-pass
#
# Original description:
# - Creates app directory structure
# - Templates docker-compose.yml, .env, and Caddyfile
# - Pulls Docker images
# - Starts the stack with docker compose
# - Waits for the health check endpoint to respond

- name: Create application directory
  ansible.builtin.file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Create data directories
  ansible.builtin.file:
    path: "{{ app_dir }}/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"
  loop:
    - backups
    - scripts
    - logs

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart llamenos stack

- name: Template .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0600"
  notify: Restart llamenos stack

- name: Template Caddyfile
  ansible.builtin.template:
    src: caddy.j2
    dest: "{{ app_dir }}/Caddyfile"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart llamenos stack

- name: Pull Docker images
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    pull: always
    state: present
    recreate: never
  register: compose_pull

- name: Start Docker Compose stack
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}"
    state: present
  register: compose_up

- name: Wait for PostgreSQL to be ready
  ansible.builtin.command: >
    docker compose -f {{ app_dir }}/docker-compose.yml
    exec -T postgres pg_isready -U llamenos -d llamenos
  register: pg_ready
  retries: 15
  delay: 2
  until: pg_ready.rc == 0
  changed_when: false

- name: Wait for application health check
  ansible.builtin.uri:
    url: "http://localhost:3000/api/health"
    method: GET
    status_code: 200
    return_content: true
  register: health_check
  retries: 20
  delay: 5
  until: health_check.status == 200

- name: Display deployment status
  ansible.builtin.debug:
    msg: |
      Llamenos deployed successfully.

      Application URL: https://{{ domain }}
      Health check: {{ health_check.json | default('OK') }}

      To view logs:
        ssh {{ deploy_user }}@{{ ansible_host }} 'cd {{ app_dir }} && docker compose logs -f'

      To check status:
        ssh {{ deploy_user }}@{{ ansible_host }} 'cd {{ app_dir }} && docker compose ps'
