---
# Legacy backup role — DEPRECATED
#
# This role has been superseded by per-service backup roles:
#   - backup-postgres  (PostgreSQL pg_dump)
#   - backup-strfry    (Nostr relay event export)
#   - backup-minio     (MinIO object mirror)
#   - backup-config    (deployment configuration)
#   - backup-monitor   (health checks + alerting)
#
# Use the backup orchestration playbook instead:
#   ansible-playbook playbooks/backup.yml --ask-vault-pass
#
# This role now delegates to the new per-service roles for backward
# compatibility. It will be removed in a future release.

- name: "[DEPRECATED] Legacy backup role — delegating to per-service roles"
  ansible.builtin.debug:
    msg: >
      The 'backup' role is deprecated. Use playbooks/backup.yml with
      per-service roles (backup-postgres, backup-strfry, backup-minio,
      backup-config, backup-monitor) instead.

- name: Include PostgreSQL backup role
  ansible.builtin.include_role:
    name: backup-postgres

- name: Include strfry backup role
  ansible.builtin.include_role:
    name: backup-strfry

- name: Include MinIO backup role
  ansible.builtin.include_role:
    name: backup-minio

- name: Include config backup role
  ansible.builtin.include_role:
    name: backup-config

- name: Include backup monitor role
  ansible.builtin.include_role:
    name: backup-monitor
