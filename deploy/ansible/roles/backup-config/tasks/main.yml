---
# Configuration backup role
#
# Archives deployment configuration files:
# - docker-compose.yml, .env, Caddyfile
# - Optional extra paths (TLS certs, etc.)
# - Docker image versions, installed packages
# - Optional age encryption
# - Retention policy (daily/weekly/monthly)
# - Manifest logging with SHA-256 checksums

- name: Install age encryption tool
  ansible.builtin.apt:
    name: age
    state: present

- name: Create config backup directories
  ansible.builtin.file:
    path: "{{ backup_config_dir }}/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0700"
  loop:
    - daily
    - weekly
    - monthly

- name: Template config backup script
  ansible.builtin.template:
    src: backup-config.sh.j2
    dest: "{{ app_dir }}/scripts/backup-config.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Run initial config backup
  ansible.builtin.command: "{{ app_dir }}/scripts/backup-config.sh --manifest"
  become_user: "{{ deploy_user }}"
  register: initial_config_backup
  changed_when: "'Backup complete' in initial_config_backup.stdout"
  ignore_errors: true

- name: Display initial backup result
  ansible.builtin.debug:
    msg: "{{ initial_config_backup.stdout_lines | default(['No output']) }}"
  when: initial_config_backup is defined
