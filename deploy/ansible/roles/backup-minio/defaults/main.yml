---
# MinIO backup defaults

backup_base_dir: "{{ app_dir }}/backups"
backup_minio_dir: "{{ backup_base_dir }}/minio"

# MinIO connection (uses mc CLI inside the minio container)
backup_minio_container: llamenos-minio-1
backup_minio_bucket: llamenos-files
backup_minio_alias: local               # mc alias name

# mc mirror options
backup_minio_remove_deleted: false       # mirror --remove (sync deletes)
backup_minio_overwrite: false            # mirror --overwrite (re-copy changed)

# Retention policy
backup_minio_retain_daily: 7
backup_minio_retain_weekly: 4
backup_minio_retain_monthly: 3

# Encryption
backup_age_public_key: ""

# Remote storage via rclone
backup_rclone_remote: ""

# Docker compose file path
backup_compose_file: "{{ app_dir }}/docker-compose.yml"
