---
# MinIO backup role
#
# Mirrors all objects from the MinIO bucket using mc mirror:
# - Archives as compressed tarball
# - Optional age encryption
# - Retention policy (daily/weekly/monthly)
# - Optional rclone upload
# - Manifest logging with SHA-256 checksums and object counts

- name: Install age encryption tool
  ansible.builtin.apt:
    name: age
    state: present

- name: Create MinIO backup directories
  ansible.builtin.file:
    path: "{{ backup_minio_dir }}/{{ item }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0700"
  loop:
    - daily
    - weekly
    - monthly

- name: Template MinIO backup script
  ansible.builtin.template:
    src: backup-minio.sh.j2
    dest: "{{ app_dir }}/scripts/backup-minio.sh"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Run initial MinIO backup
  ansible.builtin.command: "{{ app_dir }}/scripts/backup-minio.sh --manifest"
  become_user: "{{ deploy_user }}"
  register: initial_minio_backup
  changed_when: "'Backup complete' in initial_minio_backup.stdout"
  ignore_errors: true

- name: Display initial backup result
  ansible.builtin.debug:
    msg: "{{ initial_minio_backup.stdout_lines | default(['No output']) }}"
  when: initial_minio_backup is defined
