---
# PostgreSQL service role — deploys the database container
#
# Skips if:
#   - llamenos_postgres_enabled is false
#   - This host is not in the llamenos_db group (when the group has members)

- name: Skip if postgres not enabled
  ansible.builtin.meta: end_play
  when: not (llamenos_postgres_enabled | default(true))

- name: Skip if not assigned to this host
  ansible.builtin.meta: end_play
  when: >
    groups.get('llamenos_db', []) | length > 0 and
    inventory_hostname not in groups.get('llamenos_db', [])

- name: Create postgres service directory
  ansible.builtin.file:
    path: "{{ app_dir }}/services/postgres"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0750"

- name: Template postgres compose file
  ansible.builtin.template:
    src: compose/postgres.j2
    dest: "{{ app_dir }}/services/postgres/docker-compose.yml"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0640"
  notify: Restart postgres service

- name: Template postgres environment
  ansible.builtin.template:
    src: env/postgres.j2
    dest: "{{ app_dir }}/services/postgres/.env.postgres"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0600"
  notify: Restart postgres service

- name: Pull postgres image
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}/services/postgres"
    pull: always
    state: present
    recreate: never

- name: Start postgres service
  community.docker.docker_compose_v2:
    project_src: "{{ app_dir }}/services/postgres"
    state: present
  register: postgres_compose

- name: Wait for PostgreSQL to be ready
  ansible.builtin.command: >
    docker compose -f {{ app_dir }}/services/postgres/docker-compose.yml
    exec -T postgres pg_isready -U llamenos -d llamenos
  register: pg_ready
  retries: 15
  delay: 2
  until: pg_ready.rc == 0
  changed_when: false
