---
# Rolling Update Playbook with Automatic Rollback
#
# Performs a health-check-gated rolling update:
# 1. Snapshot current image versions and config (for rollback)
# 2. Run pre-update backup
# 3. Pull new images
# 4. Update infrastructure services first (postgres, rustfs, strfry, caddy)
# 5. Health-check infrastructure
# 6. Blue-green update the app service (start new, verify, stop old)
# 7. Health-check the full stack
# 8. Record successful deployment to version history
# 9. Automatic rollback on ANY failure (via rescue block)
#
# Usage:
#   ansible-playbook playbooks/update.yml --ask-vault-pass
#   ansible-playbook playbooks/update.yml --ask-vault-pass -e update_skip_backup=true
#   ansible-playbook playbooks/update.yml --ask-vault-pass -e update_services=app

- name: Rolling Update with Rollback
  hosts: all
  become: true
  vars_files:
    - ../vars.yml
  vars:
    # Which services to update: "all" or comma-separated list (e.g., "app" or "app,caddy")
    update_services: all
    # Skip pre-update backup (faster, less safe)
    update_skip_backup: false
    # Number of health check retries (each retry waits health_check_delay seconds)
    health_check_retries: 30
    health_check_delay: 5
    # Infrastructure services updated before app
    infra_services:
      - postgres
      - rustfs
      - strfry
      - caddy

  tasks:
    # ── Phase 1: Snapshot & Backup (runs outside rescue) ───────────
    - name: Track current versions (pre-update snapshot)
      ansible.builtin.include_role:
        name: llamenos-version-tracker
      tags: [update, version]

    - name: Display pre-update versions
      ansible.builtin.debug:
        msg: "Pre-update versions: {{ current_versions | to_nice_json }}"
      tags: [update]

    - name: Save pre-update docker-compose.yml for rollback
      ansible.builtin.copy:
        src: "{{ app_dir }}/docker-compose.yml"
        dest: "{{ app_dir }}/.rollback-docker-compose.yml"
        remote_src: true
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0640"
      tags: [update]

    - name: Save pre-update .env for rollback
      ansible.builtin.copy:
        src: "{{ app_dir }}/.env"
        dest: "{{ app_dir }}/.rollback-env"
        remote_src: true
        owner: "{{ deploy_user }}"
        group: "{{ deploy_group }}"
        mode: "0600"
      tags: [update]

    - name: Run pre-update backup
      ansible.builtin.include_role:
        name: backup
      when: not (update_skip_backup | bool)
      tags: [update, backup]

    # ── Phases 2-6: Update with automatic rollback on failure ──────
    - name: "Perform rolling update (rollback on failure)"
      tags: [update]
      block:
        # ── Phase 2: Pull New Images ───────────────────────────────
        - name: Re-template docker-compose.yml with current vars
          ansible.builtin.template:
            src: "../templates/docker-compose.j2"
            dest: "{{ app_dir }}/docker-compose.yml"
            owner: "{{ deploy_user }}"
            group: "{{ deploy_group }}"
            mode: "0640"

        - name: Re-template .env with current vars
          ansible.builtin.template:
            src: "../templates/env.j2"
            dest: "{{ app_dir }}/.env"
            owner: "{{ deploy_user }}"
            group: "{{ deploy_group }}"
            mode: "0600"

        - name: Pull all new images
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            pull: always
            state: present
            recreate: never

        # ── Phase 3: Update Infrastructure Services ────────────────
        - name: Determine infrastructure services to update
          ansible.builtin.set_fact:
            _infra_to_update: >-
              {{ infra_services
                 if update_services == 'all'
                 else (update_services | split(',') | intersect(infra_services)) }}

        - name: Recreate infrastructure services one by one
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            services: ["{{ item }}"]
            state: present
            recreate: always
            wait: true
            wait_timeout: 120
          loop: "{{ _infra_to_update }}"
          when: _infra_to_update | length > 0

        - name: Wait for PostgreSQL health after infra update
          ansible.builtin.command: >
            docker compose -f {{ app_dir }}/docker-compose.yml
            exec -T postgres pg_isready -U llamenos -d llamenos
          register: pg_health
          retries: 15
          delay: 3
          until: pg_health.rc == 0
          changed_when: false
          when: "'postgres' in _infra_to_update"

        # ── Phase 4: Blue-Green App Update ─────────────────────────
        - name: Scale app to 2 instances (blue + green)
          ansible.builtin.shell: |
            cd {{ app_dir }}
            docker compose up -d --scale app=2 --no-recreate app
          changed_when: true
          when: update_services == 'all' or 'app' in (update_services | split(','))

        - name: Wait for new app instance health check
          ansible.builtin.uri:
            url: "http://localhost:3000/api/health"
            method: GET
            status_code: 200
            return_content: true
          register: new_app_health
          retries: "{{ health_check_retries }}"
          delay: "{{ health_check_delay }}"
          until: new_app_health.status == 200
          when: update_services == 'all' or 'app' in (update_services | split(','))

        - name: Recreate app service with new image (replace old instances)
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            services: ["app"]
            state: present
            recreate: always
            wait: true
            wait_timeout: 120
          when: update_services == 'all' or 'app' in (update_services | split(','))

        # ── Phase 5: Final Health Verification ─────────────────────
        - name: Wait for application health check (final)
          ansible.builtin.uri:
            url: "http://localhost:3000/api/health"
            method: GET
            status_code: 200
            return_content: true
          register: final_health
          retries: "{{ health_check_retries }}"
          delay: "{{ health_check_delay }}"
          until: final_health.status == 200

        - name: Verify all services are running
          ansible.builtin.shell: |
            cd {{ app_dir }}
            unhealthy=$(docker compose ps --format json | \
              python3 -c "
            import sys, json
            lines = sys.stdin.read().strip().split('\n')
            for line in lines:
                if not line: continue
                svc = json.loads(line)
                state = svc.get('State', '')
                health = svc.get('Health', '')
                if state != 'running' or (health and health != 'healthy'):
                    print(svc.get('Service', 'unknown'))
            " 2>/dev/null || true)
            if [ -n "$unhealthy" ]; then
              echo "UNHEALTHY: $unhealthy"
              exit 1
            fi
            echo "All services healthy"
          register: all_services_check
          changed_when: false
          failed_when: all_services_check.rc != 0

        # ── Phase 6: Record Success ────────────────────────────────
        - name: Record new version to history
          ansible.builtin.include_role:
            name: llamenos-version-tracker
            tasks_from: record
          vars:
            version_action: update
            version_result: success

        - name: Clean up old Docker images
          ansible.builtin.shell: docker image prune -f
          changed_when: true

        - name: Display update summary
          ansible.builtin.debug:
            msg: |
              Rolling update completed successfully.

              Application: https://{{ domain }}
              Health check: {{ final_health.json | default('OK') }}

              Previous versions saved. Rollback available via:
                just rollback

      # ── RESCUE: Automatic Rollback on ANY failure ────────────────
      rescue:
        - name: "ROLLBACK: Log rollback trigger"
          ansible.builtin.debug:
            msg: |
              UPDATE FAILED. Initiating automatic rollback.
              Restoring previous docker-compose.yml and .env, then restarting all services.

        - name: "ROLLBACK: Restore previous docker-compose.yml"
          ansible.builtin.copy:
            src: "{{ app_dir }}/.rollback-docker-compose.yml"
            dest: "{{ app_dir }}/docker-compose.yml"
            remote_src: true
            owner: "{{ deploy_user }}"
            group: "{{ deploy_group }}"
            mode: "0640"

        - name: "ROLLBACK: Restore previous .env"
          ansible.builtin.copy:
            src: "{{ app_dir }}/.rollback-env"
            dest: "{{ app_dir }}/.env"
            remote_src: true
            owner: "{{ deploy_user }}"
            group: "{{ deploy_group }}"
            mode: "0600"

        - name: "ROLLBACK: Stop all services"
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            state: stopped

        - name: "ROLLBACK: Start services with previous configuration"
          community.docker.docker_compose_v2:
            project_src: "{{ app_dir }}"
            state: present
            recreate: always
            wait: true
            wait_timeout: 180

        - name: "ROLLBACK: Verify health after rollback"
          ansible.builtin.uri:
            url: "http://localhost:3000/api/health"
            method: GET
            status_code: 200
          register: rollback_health
          retries: 20
          delay: 5
          until: rollback_health.status == 200

        - name: "ROLLBACK: Record rollback to version history"
          ansible.builtin.include_role:
            name: llamenos-version-tracker
            tasks_from: record
          vars:
            version_action: rollback-auto
            version_result: success

        - name: "ROLLBACK: Fail with rollback notice"
          ansible.builtin.fail:
            msg: |
              Update FAILED and has been ROLLED BACK automatically.
              The previous version is running at https://{{ domain }}.

              Investigate:
                ssh {{ deploy_user }}@{{ ansible_host }} 'cd {{ app_dir }} && docker compose logs --tail=100 app'

              Version history:
                just version-history
