---
# Demo Data Reset Playbook (on-demand)
#
# Calls the /api/test-reset endpoint on the demo instance to wipe all data.
# Requires demo_vars.yml (or override with demo_vars_file).
#
# Usage:
#   ansible-playbook playbooks/reset-demo.yml --ask-vault-pass
#   ansible-playbook playbooks/reset-demo.yml --ask-vault-pass -e demo_vars_file=../demo_vars.yml

- name: Reset demo data
  hosts: demo
  gather_facts: false
  vars_files:
    - "{{ demo_vars_file | default('../demo_vars.yml') }}"
  tasks:
    - name: Call demo reset endpoint
      ansible.builtin.uri:
        url: "https://{{ domain }}/api/test-reset"
        method: POST
        headers:
          X-Test-Secret: "{{ dev_reset_secret }}"
        status_code: 200
      register: reset_result

    - name: Display reset result
      ansible.builtin.debug:
        msg: "Demo data reset complete: {{ reset_result.json }}"
