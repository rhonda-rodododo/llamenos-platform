---
# Cross-Host Restore Playbook
#
# Restores services from backup in the correct order:
# 1. Stop all services
# 2. Restore config (docker-compose.yml, .env, Caddyfile)
# 3. Restore PostgreSQL
# 4. Restore strfry (Nostr events)
# 5. Restore MinIO (file attachments)
# 6. Verify data integrity
# 7. Start services
#
# Supports:
# - Point-in-time restore from a specific manifest or timestamp
# - Dry-run mode (--check or -e restore_dry_run=true)
# - Individual service restore via --tags
#
# Usage:
#   ansible-playbook playbooks/restore.yml --ask-vault-pass
#   ansible-playbook playbooks/restore.yml --ask-vault-pass -e restore_timestamp=20260308-030000
#   ansible-playbook playbooks/restore.yml --ask-vault-pass -e restore_dry_run=true
#   ansible-playbook playbooks/restore.yml --ask-vault-pass --tags postgres
#   ansible-playbook playbooks/restore.yml --ask-vault-pass -e restore_source_host=old-server

- name: Restore from backup
  hosts: all
  become: true
  vars_files:
    - ../vars.yml

  vars:
    # Override these to restore a specific point-in-time
    restore_timestamp: ""                  # e.g., "20260308-030000" — empty means latest
    restore_dry_run: false                 # true = log actions without executing
    restore_source_dir: "{{ app_dir }}/backups"  # override for cross-host restore
    restore_age_key_path: "{{ backup_age_private_key_path | default('') }}"

  pre_tasks:
    - name: Validate age key path (if encryption is configured)
      ansible.builtin.stat:
        path: "{{ restore_age_key_path }}"
      register: age_key_stat
      when: backup_age_public_key | default('') | length > 0
      tags: always

    - name: Fail if encrypted backups but no private key
      ansible.builtin.fail:
        msg: >
          Backups are encrypted with age but no private key path was provided.
          Set backup_age_private_key_path or restore_age_key_path.
      when:
        - backup_age_public_key | default('') | length > 0
        - restore_age_key_path | length == 0 or (age_key_stat.stat.exists | default(false) == false)
      tags: always

    - name: Display restore parameters
      ansible.builtin.debug:
        msg: |
          Restore parameters:
            Timestamp filter: {{ restore_timestamp | default('latest') }}
            Source directory: {{ restore_source_dir }}
            Dry run: {{ restore_dry_run }}
            Encrypted: {{ 'yes' if backup_age_public_key | default('') | length > 0 else 'no' }}
      tags: always

  tasks:
    # ── Find backup files ──────────────────────────────────────────

    - name: Find PostgreSQL backup
      ansible.builtin.find:
        paths: "{{ restore_source_dir }}/postgres/daily"
        patterns: "{{ 'llamenos-postgres-' + restore_timestamp + '*' if restore_timestamp else 'llamenos-postgres-*' }}"
        file_type: file
      register: pg_backup_files
      tags: [postgres, strfry, minio, config]

    - name: Select PostgreSQL backup file
      ansible.builtin.set_fact:
        pg_backup_file: "{{ (pg_backup_files.files | sort(attribute='mtime') | last).path }}"
      when: pg_backup_files.matched > 0
      tags: [postgres]

    - name: Find strfry backup
      ansible.builtin.find:
        paths: "{{ restore_source_dir }}/strfry/daily"
        patterns: "{{ 'llamenos-strfry-' + restore_timestamp + '*' if restore_timestamp else 'llamenos-strfry-*' }}"
        file_type: file
      register: strfry_backup_files
      tags: [strfry]

    - name: Select strfry backup file
      ansible.builtin.set_fact:
        strfry_backup_file: "{{ (strfry_backup_files.files | sort(attribute='mtime') | last).path }}"
      when: strfry_backup_files.matched > 0
      tags: [strfry]

    - name: Find MinIO backup
      ansible.builtin.find:
        paths: "{{ restore_source_dir }}/minio/daily"
        patterns: "{{ 'llamenos-minio-' + restore_timestamp + '*' if restore_timestamp else 'llamenos-minio-*' }}"
        file_type: file
      register: minio_backup_files
      tags: [minio]

    - name: Select MinIO backup file
      ansible.builtin.set_fact:
        minio_backup_file: "{{ (minio_backup_files.files | sort(attribute='mtime') | last).path }}"
      when: minio_backup_files.matched > 0
      tags: [minio]

    - name: Find config backup
      ansible.builtin.find:
        paths: "{{ restore_source_dir }}/config/daily"
        patterns: "{{ 'llamenos-config-' + restore_timestamp + '*' if restore_timestamp else 'llamenos-config-*' }}"
        file_type: file
      register: config_backup_files
      tags: [config]

    - name: Select config backup file
      ansible.builtin.set_fact:
        config_backup_file: "{{ (config_backup_files.files | sort(attribute='mtime') | last).path }}"
      when: config_backup_files.matched > 0
      tags: [config]

    - name: Display selected backup files
      ansible.builtin.debug:
        msg: |
          Selected backup files:
            PostgreSQL: {{ pg_backup_file | default('NOT FOUND') }}
            strfry:     {{ strfry_backup_file | default('NOT FOUND') }}
            MinIO:      {{ minio_backup_file | default('NOT FOUND') }}
            Config:     {{ config_backup_file | default('NOT FOUND') }}
      tags: always

    # ── Stop services ──────────────────────────────────────────────

    - name: Stop Docker Compose stack
      ansible.builtin.command:
        cmd: docker compose -f {{ app_dir }}/docker-compose.yml down
      when: not restore_dry_run
      tags: [postgres, strfry, minio, config]
      ignore_errors: true

    - name: "[DRY RUN] Would stop Docker Compose stack"
      ansible.builtin.debug:
        msg: "docker compose down (skipped — dry run)"
      when: restore_dry_run
      tags: [postgres, strfry, minio, config]

    # ── Create temp directory ──────────────────────────────────────

    - name: Create temp directory for restore
      ansible.builtin.tempfile:
        state: directory
        prefix: llamenos-restore-
      register: restore_tmpdir
      tags: always

    # ── Restore config ─────────────────────────────────────────────

    - name: Decrypt config backup
      ansible.builtin.shell: |
        {% if backup_age_public_key | default('') | length > 0 %}
        age -d -i {{ restore_age_key_path }} -o {{ restore_tmpdir.path }}/config.tar.gz {{ config_backup_file }}
        {% else %}
        cp {{ config_backup_file }} {{ restore_tmpdir.path }}/config.tar.gz
        {% endif %}
      when:
        - config_backup_file is defined
        - not restore_dry_run
      tags: [config]

    - name: Extract and restore config files
      ansible.builtin.shell: |
        cd {{ restore_tmpdir.path }}
        tar -xzf config.tar.gz
        # Restore docker-compose.yml, .env, Caddyfile (preserve ownership)
        for f in {{ app_dir }}/docker-compose.yml {{ app_dir }}/.env {{ app_dir }}/Caddyfile; do
          relpath="${f}"
          if [ -f "{{ restore_tmpdir.path }}${relpath}" ]; then
            cp "{{ restore_tmpdir.path }}${relpath}" "${f}"
            echo "Restored: ${f}"
          fi
        done
      when:
        - config_backup_file is defined
        - not restore_dry_run
      register: config_restore_result
      tags: [config]

    - name: "[DRY RUN] Would restore config from {{ config_backup_file | default('N/A') }}"
      ansible.builtin.debug:
        msg: "Config restore skipped (dry run)"
      when: restore_dry_run and config_backup_file is defined
      tags: [config]

    # ── Start PostgreSQL only for data restore ─────────────────────

    - name: Start PostgreSQL container only
      ansible.builtin.command:
        cmd: docker compose -f {{ app_dir }}/docker-compose.yml up -d postgres
      when: not restore_dry_run and (pg_backup_file is defined or strfry_backup_file is defined or minio_backup_file is defined)
      tags: [postgres, strfry, minio]

    - name: Wait for PostgreSQL to be ready
      ansible.builtin.command:
        cmd: docker compose -f {{ app_dir }}/docker-compose.yml exec -T postgres pg_isready -U llamenos -d llamenos
      register: pg_ready
      retries: 15
      delay: 2
      until: pg_ready.rc == 0
      changed_when: false
      when: not restore_dry_run and pg_backup_file is defined
      tags: [postgres]

    # ── Restore PostgreSQL ─────────────────────────────────────────

    - name: Decrypt PostgreSQL backup
      ansible.builtin.shell: |
        {% if backup_age_public_key | default('') | length > 0 %}
        age -d -i {{ restore_age_key_path }} -o {{ restore_tmpdir.path }}/pg.dump {{ pg_backup_file }}
        {% else %}
        cp {{ pg_backup_file }} {{ restore_tmpdir.path }}/pg.dump
        {% endif %}
      when:
        - pg_backup_file is defined
        - not restore_dry_run
      tags: [postgres]

    - name: Drop and recreate database
      ansible.builtin.shell: |
        docker compose -f {{ app_dir }}/docker-compose.yml exec -T postgres \
          psql -U llamenos -d postgres -c "DROP DATABASE IF EXISTS llamenos;"
        docker compose -f {{ app_dir }}/docker-compose.yml exec -T postgres \
          psql -U llamenos -d postgres -c "CREATE DATABASE llamenos OWNER llamenos;"
      when:
        - pg_backup_file is defined
        - not restore_dry_run
      tags: [postgres]

    - name: Restore PostgreSQL from backup
      ansible.builtin.shell: |
        docker compose -f {{ app_dir }}/docker-compose.yml exec -T postgres \
          pg_restore -U llamenos -d llamenos --no-owner --no-privileges \
          < {{ restore_tmpdir.path }}/pg.dump
      register: pg_restore_result
      when:
        - pg_backup_file is defined
        - not restore_dry_run
      tags: [postgres]
      ignore_errors: true

    - name: Validate PostgreSQL restore
      ansible.builtin.command:
        cmd: >
          docker compose -f {{ app_dir }}/docker-compose.yml exec -T postgres
          psql -U llamenos -d llamenos -t -c "SELECT COUNT(*) FROM kv_store"
      register: pg_validate
      when:
        - pg_backup_file is defined
        - not restore_dry_run
      tags: [postgres]

    - name: Display PostgreSQL restore result
      ansible.builtin.debug:
        msg: "PostgreSQL restore: kv_store rows = {{ pg_validate.stdout | trim }}"
      when: pg_validate is defined and pg_validate.stdout is defined
      tags: [postgres]

    - name: "[DRY RUN] Would restore PostgreSQL from {{ pg_backup_file | default('N/A') }}"
      ansible.builtin.debug:
        msg: "PostgreSQL restore skipped (dry run)"
      when: restore_dry_run and pg_backup_file is defined
      tags: [postgres]

    # ── Restore strfry ─────────────────────────────────────────────

    - name: Start strfry container
      ansible.builtin.command:
        cmd: docker compose -f {{ app_dir }}/docker-compose.yml up -d strfry
      when: not restore_dry_run and strfry_backup_file is defined
      tags: [strfry]

    - name: Wait for strfry to be ready
      ansible.builtin.uri:
        url: "http://localhost:7777"
        method: GET
        status_code: [200, 101, 400]
      register: strfry_ready
      retries: 10
      delay: 2
      until: strfry_ready.status is defined
      when: not restore_dry_run and strfry_backup_file is defined
      tags: [strfry]
      ignore_errors: true

    - name: Decrypt strfry backup
      ansible.builtin.shell: |
        {% if backup_age_public_key | default('') | length > 0 %}
        age -d -i {{ restore_age_key_path }} {{ strfry_backup_file }} | gunzip > {{ restore_tmpdir.path }}/strfry-events.jsonl
        {% else %}
        gunzip -c {{ strfry_backup_file }} > {{ restore_tmpdir.path }}/strfry-events.jsonl
        {% endif %}
      when:
        - strfry_backup_file is defined
        - not restore_dry_run
      tags: [strfry]

    - name: Import events into strfry
      ansible.builtin.shell: |
        cat {{ restore_tmpdir.path }}/strfry-events.jsonl | \
          docker compose -f {{ app_dir }}/docker-compose.yml exec -T strfry strfry import
      register: strfry_restore_result
      when:
        - strfry_backup_file is defined
        - not restore_dry_run
      tags: [strfry]
      ignore_errors: true

    - name: Display strfry restore result
      ansible.builtin.debug:
        msg: "strfry import: {{ strfry_restore_result.stdout_lines | default(['no output']) }}"
      when: strfry_restore_result is defined
      tags: [strfry]

    - name: "[DRY RUN] Would restore strfry from {{ strfry_backup_file | default('N/A') }}"
      ansible.builtin.debug:
        msg: "strfry restore skipped (dry run)"
      when: restore_dry_run and strfry_backup_file is defined
      tags: [strfry]

    # ── Restore MinIO ──────────────────────────────────────────────

    - name: Start MinIO container
      ansible.builtin.command:
        cmd: docker compose -f {{ app_dir }}/docker-compose.yml up -d minio
      when: not restore_dry_run and minio_backup_file is defined
      tags: [minio]

    - name: Wait for MinIO to be healthy
      ansible.builtin.command:
        cmd: docker compose -f {{ app_dir }}/docker-compose.yml exec -T minio mc ready local
      register: minio_ready
      retries: 10
      delay: 2
      until: minio_ready.rc == 0
      when: not restore_dry_run and minio_backup_file is defined
      tags: [minio]
      ignore_errors: true

    - name: Decrypt and extract MinIO backup
      ansible.builtin.shell: |
        mkdir -p {{ restore_tmpdir.path }}/minio-restore
        {% if backup_age_public_key | default('') | length > 0 %}
        age -d -i {{ restore_age_key_path }} {{ minio_backup_file }} | tar -xzf - -C {{ restore_tmpdir.path }}/minio-restore
        {% else %}
        tar -xzf {{ minio_backup_file }} -C {{ restore_tmpdir.path }}/minio-restore
        {% endif %}
      when:
        - minio_backup_file is defined
        - not restore_dry_run
      tags: [minio]

    - name: Copy restored files into MinIO container
      ansible.builtin.shell: |
        CONTAINER_NAME="$(docker compose -f {{ app_dir }}/docker-compose.yml ps -q minio)"
        docker cp {{ restore_tmpdir.path }}/minio-restore/. "${CONTAINER_NAME}:/tmp/minio-restore/"
        docker compose -f {{ app_dir }}/docker-compose.yml exec -T minio \
          sh -c "mc alias set local http://localhost:9000 \${MINIO_ROOT_USER} \${MINIO_ROOT_PASSWORD} --api S3v4 2>/dev/null; \
                 mc mb --ignore-existing local/{{ backup_minio_bucket | default('llamenos-files') }}; \
                 mc mirror /tmp/minio-restore/ local/{{ backup_minio_bucket | default('llamenos-files') }}/ --overwrite; \
                 rm -rf /tmp/minio-restore"
      register: minio_restore_result
      when:
        - minio_backup_file is defined
        - not restore_dry_run
      tags: [minio]
      ignore_errors: true

    - name: Display MinIO restore result
      ansible.builtin.debug:
        msg: "MinIO restore: {{ minio_restore_result.stdout_lines | default(['no output']) }}"
      when: minio_restore_result is defined
      tags: [minio]

    - name: "[DRY RUN] Would restore MinIO from {{ minio_backup_file | default('N/A') }}"
      ansible.builtin.debug:
        msg: "MinIO restore skipped (dry run)"
      when: restore_dry_run and minio_backup_file is defined
      tags: [minio]

    # ── Start full stack ───────────────────────────────────────────

    - name: Start full Docker Compose stack
      ansible.builtin.command:
        cmd: docker compose -f {{ app_dir }}/docker-compose.yml up -d
      when: not restore_dry_run
      tags: [postgres, strfry, minio, config]

    - name: Wait for application health check
      ansible.builtin.uri:
        url: "http://localhost:3000/api/health"
        method: GET
        status_code: 200
        return_content: true
      register: health_check
      retries: 20
      delay: 5
      until: health_check.status == 200
      when: not restore_dry_run
      tags: [postgres, strfry, minio, config]
      ignore_errors: true

    - name: Display restore summary
      ansible.builtin.debug:
        msg: |
          Restore {{ 'DRY RUN ' if restore_dry_run else '' }}complete.

          PostgreSQL: {{ 'RESTORED' if pg_backup_file is defined and not restore_dry_run else 'SKIPPED' }}
          strfry:     {{ 'RESTORED' if strfry_backup_file is defined and not restore_dry_run else 'SKIPPED' }}
          MinIO:      {{ 'RESTORED' if minio_backup_file is defined and not restore_dry_run else 'SKIPPED' }}
          Config:     {{ 'RESTORED' if config_backup_file is defined and not restore_dry_run else 'SKIPPED' }}

          Health check: {{ health_check.json | default('N/A') }}

          ⚠ Verify data integrity manually before resuming operations.
      tags: always

  always:
    - name: Clean up temp directory
      ansible.builtin.file:
        path: "{{ restore_tmpdir.path }}"
        state: absent
      when: restore_tmpdir is defined
      tags: always
