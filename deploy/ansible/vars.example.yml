---
# Llamenos Deployment Configuration
#
# Copy this file to vars.yml and fill in your values.
# Encrypt secrets with: ansible-vault encrypt vars.yml
#
# Usage:
#   cp vars.example.yml vars.yml
#   $EDITOR vars.yml
#   ansible-vault encrypt vars.yml
#   just setup-all --ask-vault-pass
#
# To edit encrypted vars:
#   ansible-vault edit vars.yml

# ─── Domain & TLS ────────────────────────────────────────────────
# Your domain name (Caddy will auto-provision TLS via Let's Encrypt)
domain: hotline.yourdomain.org

# Email for Let's Encrypt certificate notifications
acme_email: admin@yourdomain.org

# ─── SSH Hardening ───────────────────────────────────────────────
# Port to move SSH to (default 22 is heavily targeted by bots)
ssh_port: 2222

# CIDR ranges allowed to connect via SSH
# Restrict to your admin IP addresses for maximum security
ssh_allowed_cidrs:
  - "REPLACE_WITH_YOUR_IP/32"  # REQUIRED — restrict to your admin IP(s)

# ─── Deploy User ─────────────────────────────────────────────────
# The non-root user that runs the application
deploy_user: deploy
deploy_group: deploy

# ─── Service Toggles ────────────────────────────────────────────
# Each service can be independently enabled/disabled.
# Services only deploy to hosts in their inventory group.
# Core services default to enabled; optional services default to disabled.
llamenos_app_enabled: true
llamenos_postgres_enabled: true
llamenos_caddy_enabled: true
llamenos_rustfs_enabled: true
llamenos_strfry_enabled: true
llamenos_transcription_enabled: false
llamenos_asterisk_enabled: false
llamenos_signal_enabled: false

# ─── Service Images ─────────────────────────────────────────────
# Pin all images to specific versions + digests for reproducible deployments.
# Image digests must be re-verified when updating tags.
# Use: docker inspect --format='{{index .RepoDigests 0}}' <image>:<tag>
llamenos_app_image: ghcr.io/llamenos/llamenos:0.1.0  # Update on each release
llamenos_postgres_image: postgres:17-alpine@sha256:3430fe182f5065a6ea505c3d432d2c7fff18fbab954df8f277c1dbf4c70124af
llamenos_caddy_image: caddy:2.9-alpine@sha256:b4e3952384eb9524a887633ce65c752dd7c71314d2c2acf98cd5c715aaa534f0
llamenos_rustfs_image: rustfs/rustfs:latest
llamenos_strfry_image: dockurr/strfry:1.0.1@sha256:4bcfddc8aab07e17d35198c0618d6a9c8e5d3e27b211741ebce9f7058cdd1e21
llamenos_whisper_image: fedirz/faster-whisper-server:0.4.1  # digest pin pending: tag not yet on Docker Hub
llamenos_asterisk_image: andrius/asterisk@sha256:e30df5ec1b512827bf3cffc49b8000b07376a05c950736d028348eba80035015  # 20.x
llamenos_signal_image: bbernhard/signal-cli-rest-api:0.92@sha256:702db336aa1a87611595e66755c9ccf65b24c25589857301eabef1d46056b3c5

# ─── Application ─────────────────────────────────────────────────
# Directory on the host where app files are stored
app_dir: /opt/llamenos

# Name displayed in the UI (use a generic name for security)
hotline_name: Hotline

# Application environment
environment: production

# Admin public key (generate with: bun run bootstrap-admin)
# This is the Nostr pubkey of the admin account
admin_pubkey: ""

# HMAC secret for hashing phone numbers and IPs
# Generate with: openssl rand -hex 32
hmac_secret: ""

# ─── PostgreSQL ──────────────────────────────────────────────────
# Database password (generate with: openssl rand -base64 24)
pg_password: ""

# Connection pool size
pg_pool_size: 10

# Port to expose when PostgreSQL is on a separate host (multi-host only)
llamenos_postgres_port: 5432

# ─── RustFS (Blob Storage) ──────────────────────────────────────
# Access credentials (generate with: openssl rand -base64 24)
storage_access_key: ""
storage_secret_key: ""
storage_bucket: llamenos-files

# Port to expose when RustFS is on a separate host (multi-host only)
llamenos_rustfs_port: 9000

# ─── Telephony (Twilio) ─────────────────────────────────────────
# Leave empty if configuring via the admin UI or using Asterisk
twilio_account_sid: ""
twilio_auth_token: ""
twilio_phone_number: ""

# ─── Nostr Relay (Core) ─────────────────────────────────────────
# Server secret for signing relay events (used for all real-time updates).
# Generate with: openssl rand -hex 32
server_nostr_secret: ""

# Relay URL (default: ws://strfry:7777 for the bundled strfry)
# nostr_relay_url: "ws://strfry:7777"

# Port to expose when strfry is on a separate host (multi-host only)
llamenos_strfry_port: 7777

# ─── Optional Profiles (DEPRECATED) ─────────────────────────────
# These are kept for backward compatibility with the monolithic compose template.
# For new deployments, use llamenos_*_enabled toggles above instead.
compose_profiles: []

# Whisper transcription settings (only used if transcription is enabled)
whisper_model: Systran/faster-whisper-base
whisper_device: cpu

# Asterisk PBX settings (only used if asterisk is enabled)
ari_username: llamenos
ari_password: ""
bridge_secret: ""

# Signal bridge settings (only used if signal is enabled)
# No additional config needed beyond enabling

# ─── Cross-Host Networking ──────────────────────────────────────
# Enable TLS between services on different hosts (recommended for multi-host)
llamenos_internal_tls_enabled: false

# ─── Backup ─────────────────────────────────────────────────────
# Enable automated backups
backup_enabled: true

# age public key for encrypting backups
# Generate a keypair with: age-keygen -o backup-key.txt
# Store the private key somewhere safe (NOT on the server)
backup_age_public_key: ""

# Path to age private key (for restore operations only — NOT stored on server)
# backup_age_private_key_path: "/path/to/backup-key.txt"

# Backup schedule (cron format) — default: 3:00 AM UTC daily
backup_cron_hour: "3"
backup_cron_minute: "0"

# rclone remote for off-site backup storage
# Configure rclone on the server first: rclone config
# Examples: "s3:llamenos-backups", "b2:llamenos-backups"
backup_rclone_remote: ""

# ─── Per-Service Backup Retention ──────────────────────────────
# Override per-service if needed; defaults are sensible for most deployments

# PostgreSQL (pg_dump custom format, compressed)
backup_postgres_retain_daily: 7
backup_postgres_retain_weekly: 4
backup_postgres_retain_monthly: 3
# backup_postgres_exclude_tables: []    # Tables to skip (e.g., sessions)
# backup_postgres_wal_enabled: false    # Enable WAL archiving for PITR

# strfry (Nostr relay event export as JSONL)
backup_strfry_retain_daily: 7
backup_strfry_retain_weekly: 4
backup_strfry_retain_monthly: 3

# RustFS (object store mirror)
backup_rustfs_retain_daily: 7
backup_rustfs_retain_weekly: 4
backup_rustfs_retain_monthly: 3

# Config (docker-compose.yml, .env, Caddyfile, etc.)
backup_config_retain_daily: 14
backup_config_retain_weekly: 8
backup_config_retain_monthly: 6
# Additional paths to back up (e.g., TLS certs, custom scripts)
backup_config_extra_paths: []

# ─── Backup Monitoring ────────────────────────────────────────
# Maximum hours before a backup is considered stale
backup_monitor_max_age_hours: 26

# Webhook for alert notifications (leave empty to disable)
# backup_monitor_webhook_url: "https://hooks.slack.com/services/..."
# backup_monitor_webhook_type: slack   # slack, discord, or generic

# ─── Docker Hardening ───────────────────────────────────────────
# Enable user namespace remapping for Docker container isolation
docker_userns_remap: true

# ─── Firewall ───────────────────────────────────────────────────
# Additional ports to open beyond SSH, HTTP, and HTTPS
# Example: [{ port: 5060, proto: "udp", comment: "SIP" }]
firewall_extra_ports: []

# ─── NTP ─────────────────────────────────────────────────────────
# NTP servers (accurate time is critical for Schnorr token validation)
ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"
  - "2.pool.ntp.org"
  - "3.pool.ntp.org"

# ─── Observability ──────────────────────────────────────────────
# Master toggle — set to true to deploy monitoring stack
observability_enabled: false

# Individual service toggles (all require observability_enabled: true)
prometheus_enabled: true
grafana_enabled: true
loki_enabled: true
promtail_enabled: true
alertmanager_enabled: true
node_exporter_enabled: true

# Lightweight alternative — if true, disables Prometheus/Grafana/Loki/Promtail
# and uses a simple HTTP health poller with ntfy notifications instead
healthcheck_only: false

# Prometheus settings
prometheus_image: prom/prometheus:v3.2.1
prometheus_retention: 15d
prometheus_retention_size: 5GB
prometheus_scrape_interval: 15s

# Grafana settings
grafana_image: grafana/grafana-oss:11.5.2
grafana_admin_password: ""  # Generate with: openssl rand -base64 24
grafana_domain: ""          # Leave empty to use {{ domain }} with /grafana path
grafana_allow_signup: false

# Loki settings
loki_image: grafana/loki:3.4.2
loki_retention_period: 168h  # 7 days

# Promtail settings
promtail_image: grafana/promtail:3.4.2

# Alertmanager settings
alertmanager_image: prom/alertmanager:v0.28.1

# Alert notification — choose one:
#   "email"   → SMTP (set alert_smtp_* below)
#   "ntfy"    → ntfy.sh push notifications (set alert_ntfy_* below)
#   "webhook" → generic webhook (set alert_webhook_url below)
alert_notification_method: ntfy

# SMTP settings (for alert_notification_method: email)
alert_smtp_host: ""
alert_smtp_port: 587
alert_smtp_username: ""
alert_smtp_password: ""
alert_smtp_from: "alerts@yourdomain.org"
alert_smtp_to: "oncall@yourdomain.org"

# ntfy settings (for alert_notification_method: ntfy)
alert_ntfy_url: "https://ntfy.sh"
alert_ntfy_topic: "llamenos-alerts"
alert_ntfy_token: ""  # Optional auth token

# Webhook settings (for alert_notification_method: webhook)
alert_webhook_url: ""

# Node exporter settings
node_exporter_image: prom/node-exporter:v1.9.0

# Healthcheck-only mode settings (used when healthcheck_only: true)
healthcheck_image: curlimages/curl:8.12.1
healthcheck_interval: 30     # seconds between checks
healthcheck_endpoints:
  - name: app
    url: "http://app:3000/api/health"
  - name: postgres
    url: "tcp://postgres:5432"
  - name: strfry
    url: "http://strfry:7777"
healthcheck_ntfy_url: "https://ntfy.sh"
healthcheck_ntfy_topic: "llamenos-health"

# ─── Auto-Healing & Monitoring ──────────────────────────────────
# Webhook URL for alerts (ntfy, gotify, or any HTTP endpoint)
# Example: https://ntfy.sh/llamenos-alerts
llamenos_alert_webhook: ""

# Container watchdog: consecutive failures before restart
llamenos_watchdog_max_failures: 3

# Container watchdog: max restarts per day before escalating to critical
llamenos_watchdog_max_restarts: 5

# Certificate expiry: alert when fewer than this many days remain
llamenos_alert_cert_expiry_days: 7

# Disk space: warning threshold percentage
llamenos_alert_disk_percent: 85

# Enable/disable PostgreSQL maintenance (vacuum, cleanup)
llamenos_postgres_enabled: true

# Enable/disable Caddy certificate monitoring
llamenos_caddy_enabled: true

# ─── Alerting ─────────────────────────────────────────────────────────
# Opt-in operator alerting: cron-based health checks every 5 minutes.
# Checks app health, disk, backups, TLS, NTP, containers, PostgreSQL.
# State-based deduplication prevents alert spam.
llamenos_alerting_enabled: false

# Alert provider: ntfy, gotify, email, or webhook
llamenos_alerting_provider: ntfy

# ntfy settings (default provider)
llamenos_ntfy_url: "https://ntfy.sh"
llamenos_ntfy_topic: "llamenos-alerts"
# llamenos_ntfy_token: ""  # Optional auth token for self-hosted ntfy

# Tags included in alert metadata
llamenos_alerting_tags: "llamenos"

# Gotify settings (uncomment if using gotify provider)
# llamenos_gotify_url: "https://gotify.yourdomain.org"
# llamenos_gotify_token: ""

# Email settings (uncomment if using email provider — requires msmtp)
# llamenos_alerting_email_to: "oncall@yourdomain.org"
# llamenos_alerting_email_from: "alerts@yourdomain.org"

# Webhook settings (uncomment if using webhook provider)
# llamenos_alerting_webhook_url: "https://hooks.example.com/alerting"

# Health check thresholds (override defaults)
# llamenos_alerting_app_health_url: "http://localhost:3000/api/health"
# llamenos_alerting_tls_port: 443
# llamenos_alerting_pg_container: "llamenos-postgres-1"
# llamenos_alerting_pg_max_size_gb: 50

# ─── Security Scanning ─────────────────────────────────────────────
# Enable automated security updates (OS packages + container images)
security_auto_updates: true

# Hour and minute (UTC) for automated security update timer
security_update_hour: "4"
security_update_minute: "0"

# Trivy scan severity threshold (comma-separated)
security_scan_severity: "CRITICAL,HIGH"

# Fail playbook run if OS security updates are pending
security_scan_fail_on_os_updates: false

# Generate CycloneDX SBOM for running container images
security_generate_sbom: false

# ─── System ─────────────────────────────────────────────────────
# Timezone for the server
timezone: UTC

# Locale
locale: en_US.UTF-8
