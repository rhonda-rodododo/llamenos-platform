# Llamenos Deployment Configuration
#
# Copy this file to vars.yml and fill in your values.
# Encrypt secrets with: ansible-vault encrypt vars.yml
#
# Usage:
#   cp vars.example.yml vars.yml
#   $EDITOR vars.yml
#   ansible-vault encrypt vars.yml
#   just setup-all --ask-vault-pass
#
# To edit encrypted vars:
#   ansible-vault edit vars.yml

# ─── Domain & TLS ────────────────────────────────────────────────
# Your domain name (Caddy will auto-provision TLS via Let's Encrypt)
domain: hotline.yourdomain.org

# Email for Let's Encrypt certificate notifications
acme_email: admin@yourdomain.org

# ─── SSH Hardening ───────────────────────────────────────────────
# Port to move SSH to (default 22 is heavily targeted by bots)
ssh_port: 2222

# CIDR ranges allowed to connect via SSH
# Restrict to your admin IP addresses for maximum security
ssh_allowed_cidrs:
  - "REPLACE_WITH_YOUR_IP/32"  # REQUIRED — restrict to your admin IP(s)

# ─── Deploy User ─────────────────────────────────────────────────
# The non-root user that runs the application
deploy_user: deploy
deploy_group: deploy

# ─── Service Toggles ────────────────────────────────────────────
# Each service can be independently enabled/disabled.
# Services only deploy to hosts in their inventory group.
# Core services default to enabled; optional services default to disabled.
llamenos_app_enabled: true
llamenos_postgres_enabled: true
llamenos_caddy_enabled: true
llamenos_minio_enabled: true
llamenos_strfry_enabled: true
llamenos_transcription_enabled: false
llamenos_asterisk_enabled: false
llamenos_signal_enabled: false

# ─── Service Images ─────────────────────────────────────────────
# Pin to specific tags for reproducible deployments.
# Use "latest" only for development.
llamenos_app_image: ghcr.io/llamenos/llamenos:latest
llamenos_postgres_image: postgres:17-alpine
llamenos_caddy_image: caddy:2.9-alpine
llamenos_minio_image: minio/minio:RELEASE.2025-01-20T14-49-07Z
llamenos_strfry_image: dockurr/strfry:latest
llamenos_whisper_image: fedirz/faster-whisper-server:0.4.1
llamenos_asterisk_image: andrius/asterisk:20
llamenos_signal_image: bbernhard/signal-cli-rest-api:0.92

# ─── Application ─────────────────────────────────────────────────
# Directory on the host where app files are stored
app_dir: /opt/llamenos

# Name displayed in the UI (use a generic name for security)
hotline_name: Hotline

# Application environment
environment: production

# Admin public key (generate with: bun run bootstrap-admin)
# This is the Nostr pubkey of the admin account
admin_pubkey: ""

# HMAC secret for hashing phone numbers and IPs
# Generate with: openssl rand -hex 32
hmac_secret: ""

# ─── PostgreSQL ──────────────────────────────────────────────────
# Database password (generate with: openssl rand -base64 24)
pg_password: ""

# Connection pool size
pg_pool_size: 10

# Port to expose when PostgreSQL is on a separate host (multi-host only)
llamenos_postgres_port: 5432

# ─── MinIO (Blob Storage) ───────────────────────────────────────
# Access credentials (generate with: openssl rand -base64 24)
minio_access_key: ""
minio_secret_key: ""
minio_bucket: llamenos-files

# Port to expose when MinIO is on a separate host (multi-host only)
llamenos_minio_port: 9000

# ─── Telephony (Twilio) ─────────────────────────────────────────
# Leave empty if configuring via the admin UI or using Asterisk
twilio_account_sid: ""
twilio_auth_token: ""
twilio_phone_number: ""

# ─── Nostr Relay (Core) ─────────────────────────────────────────
# Server secret for signing relay events (used for all real-time updates).
# Generate with: openssl rand -hex 32
server_nostr_secret: ""

# Relay URL (default: ws://strfry:7777 for the bundled strfry)
# nostr_relay_url: "ws://strfry:7777"

# Port to expose when strfry is on a separate host (multi-host only)
llamenos_strfry_port: 7777

# ─── Optional Profiles (DEPRECATED) ─────────────────────────────
# These are kept for backward compatibility with the monolithic compose template.
# For new deployments, use llamenos_*_enabled toggles above instead.
compose_profiles: []

# Whisper transcription settings (only used if transcription is enabled)
whisper_model: Systran/faster-whisper-base
whisper_device: cpu

# Asterisk PBX settings (only used if asterisk is enabled)
ari_username: llamenos
ari_password: ""
bridge_secret: ""

# Signal bridge settings (only used if signal is enabled)
# No additional config needed beyond enabling

# ─── Cross-Host Networking ──────────────────────────────────────
# Enable TLS between services on different hosts (recommended for multi-host)
llamenos_internal_tls_enabled: false

# ─── Backup ─────────────────────────────────────────────────────
# Enable automated backups
backup_enabled: true

# age public key for encrypting backups
# Generate a keypair with: age-keygen -o backup-key.txt
# Store the private key somewhere safe (NOT on the server)
backup_age_public_key: ""

# Path to age private key (for restore operations only — NOT stored on server)
# backup_age_private_key_path: "/path/to/backup-key.txt"

# Backup schedule (cron format) — default: 3:00 AM UTC daily
backup_cron_hour: "3"
backup_cron_minute: "0"

# rclone remote for off-site backup storage
# Configure rclone on the server first: rclone config
# Examples: "s3:llamenos-backups", "b2:llamenos-backups"
backup_rclone_remote: ""

# ─── Per-Service Backup Retention ──────────────────────────────
# Override per-service if needed; defaults are sensible for most deployments

# PostgreSQL (pg_dump custom format, compressed)
backup_postgres_retain_daily: 7
backup_postgres_retain_weekly: 4
backup_postgres_retain_monthly: 3
# backup_postgres_exclude_tables: []    # Tables to skip (e.g., sessions)
# backup_postgres_wal_enabled: false    # Enable WAL archiving for PITR

# strfry (Nostr relay event export as JSONL)
backup_strfry_retain_daily: 7
backup_strfry_retain_weekly: 4
backup_strfry_retain_monthly: 3

# MinIO (object store mirror)
backup_minio_retain_daily: 7
backup_minio_retain_weekly: 4
backup_minio_retain_monthly: 3

# Config (docker-compose.yml, .env, Caddyfile, etc.)
backup_config_retain_daily: 14
backup_config_retain_weekly: 8
backup_config_retain_monthly: 6
# Additional paths to back up (e.g., TLS certs, custom scripts)
backup_config_extra_paths: []

# ─── Backup Monitoring ────────────────────────────────────────
# Maximum hours before a backup is considered stale
backup_monitor_max_age_hours: 26

# Webhook for alert notifications (leave empty to disable)
# backup_monitor_webhook_url: "https://hooks.slack.com/services/..."
# backup_monitor_webhook_type: slack   # slack, discord, or generic

# ─── Docker Hardening ───────────────────────────────────────────
# Enable user namespace remapping for Docker container isolation
docker_userns_remap: true

# ─── Firewall ───────────────────────────────────────────────────
# Additional ports to open beyond SSH, HTTP, and HTTPS
# Example: [{ port: 5060, proto: "udp", comment: "SIP" }]
firewall_extra_ports: []

# ─── NTP ─────────────────────────────────────────────────────────
# NTP servers (accurate time is critical for Schnorr token validation)
ntp_servers:
  - "0.pool.ntp.org"
  - "1.pool.ntp.org"
  - "2.pool.ntp.org"
  - "3.pool.ntp.org"

# ─── System ─────────────────────────────────────────────────────
# Timezone for the server
timezone: UTC

# Locale
locale: en_US.UTF-8
