# Llamenos Dev Services
#
# Starts only the backing services (PostgreSQL, MinIO, strfry) without the app.
# The app runs locally via `bun run dev:server`.
#
# Usage:
#   docker compose -f deploy/docker/docker-compose.dev.yml up -d
#   bun run dev:server
#
# Stop:
#   docker compose -f deploy/docker/docker-compose.dev.yml down
#
# Reset data:
#   docker compose -f deploy/docker/docker-compose.dev.yml down -v

name: llamenos-dev

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: llamenos
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: llamenos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llamenos -d llamenos"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  strfry:
    image: dockurr/strfry:1.0.1
    ports:
      - "7777:7777"
    volumes:
      - strfrydata:/app/strfry-db
      - ./strfry-dev.conf:/etc/strfry.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7777"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pgdata:
  miniodata:
  strfrydata:
