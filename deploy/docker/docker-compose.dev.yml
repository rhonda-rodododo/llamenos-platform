# Llamenos Dev Services
#
# Starts only the backing services (PostgreSQL, MinIO, strfry) without the app.
# The app runs locally via `bun run dev:server`.
#
# Usage:
#   docker compose -f deploy/docker/docker-compose.dev.yml up -d                    # Core dev services
#   docker compose -f deploy/docker/docker-compose.dev.yml --profile signal up -d   # + Signal
#   docker compose -f deploy/docker/docker-compose.dev.yml --profile inference up -d # + Ollama
#   bun run dev:server
#
# Optional profiles:
#   --profile signal      - Signal CLI + notifier sidecar
#   --profile telephony   - Asterisk PBX + SIP bridge
#
# Stop:
#   docker compose -f deploy/docker/docker-compose.dev.yml down
#
# Reset data:
#   docker compose -f deploy/docker/docker-compose.dev.yml down -v

name: llamenos-dev

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: llamenos
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: llamenos
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llamenos -d llamenos"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  strfry:
    image: dockurr/strfry:1.0.1
    ports:
      - "7777:7777"
    volumes:
      - strfrydata:/app/strfry-db
      - ./strfry-dev.conf:/etc/strfry.conf:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7777"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Optional: Signal notifications (for local dev with Signal)
  # Start with: docker compose -f deploy/docker/docker-compose.dev.yml --profile signal up -d
  signal-cli:
    image: bbernhard/signal-cli-rest-api:0.92
    profiles: ["signal"]
    ports:
      - "8090:8080"
    environment:
      - MODE=json-rpc
      - AUTO_RECEIVE_SCHEDULE=0 * * * *
    volumes:
      - signal-data:/home/.local/share/signal-cli
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/about"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  signal-notifier:
    profiles: ["signal"]
    build:
      context: ../../signal-notifier
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    environment:
      - NOTIFIER_API_KEY=${NOTIFIER_API_KEY:-dev-notifier-key}
      - NOTIFIER_TOKEN_SECRET=${NOTIFIER_TOKEN_SECRET:-dev-token-secret}
      - SIGNAL_BRIDGE_URL=http://signal-cli:8080
      - SIGNAL_BRIDGE_API_KEY=${SIGNAL_BRIDGE_API_KEY:-}
      - SIGNAL_REGISTERED_NUMBER=${SIGNAL_REGISTERED_NUMBER:-}
      - NOTIFIER_DB_PATH=/app/data/notifier.db
    volumes:
      - signal-notifier-data:/app/data
    depends_on:
      signal-cli:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Optional: Ollama local inference (inference profile) ──
  # Start with: docker compose -f deploy/docker/docker-compose.dev.yml --profile inference up -d
  ollama:
    image: ollama/ollama:0.6
    profiles: ["inference"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Optional: Asterisk PBX for local SIP telephony dev ─────────────────
  # Start with: docker compose -f deploy/docker/docker-compose.dev.yml --profile telephony up -d
  asterisk:
    image: andrius/asterisk@sha256:e30df5ec1b512827bf3cffc49b8000b07376a05c950736d028348eba80035015 # 20.x
    profiles: ["telephony"]
    ports:
      - "5060:5060/udp"   # SIP
      - "5060:5060/tcp"   # SIP TCP
      - "8088:8088"       # ARI HTTP
    volumes:
      - asterisk-config:/etc/asterisk
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # SIP bridge — translates ARI events to Llamenos webhook format.
  sip-bridge:
    profiles: ["telephony"]
    build:
      context: ../../sip-bridge
      dockerfile: Dockerfile
    ports:
      - "3200:3000"
    environment:
      - PBX_TYPE=ari
      - ARI_URL=ws://asterisk:8088/ari/events
      - ARI_REST_URL=http://asterisk:8088/ari
      - ARI_USERNAME=${ARI_USERNAME:-llamenos}
      - ARI_PASSWORD=${ARI_PASSWORD:?ARI_PASSWORD is required — set in .env}
      - WORKER_WEBHOOK_URL=http://host.docker.internal:3000
      - BRIDGE_SECRET=${BRIDGE_SECRET:?BRIDGE_SECRET is required — generate with openssl rand -hex 32}
    depends_on:
      asterisk:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  pgdata:
  miniodata:
  strfrydata:
  signal-data:
  signal-notifier-data:
  ollama-data:
  asterisk-config:
