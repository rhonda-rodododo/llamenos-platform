# strfry config for production — hardened relay
# Mount via docker-compose.yml or Helm chart.

db = "./strfry-db/"

dbParams {
    maxreaders = 256
    mapsize = 10995116277760
    noReadAhead = false
}

events {
    maxEventSize = 65536
    rejectEventsNewerThanSeconds = 30
    rejectEventsOlderThanSeconds = 300
    rejectEphemeralEventsOlderThanSeconds = 60
    ephemeralEventsLifetimeSeconds = 300
    maxNumTags = 50
    maxTagValSize = 256
}

relay {
    bind = "0.0.0.0"
    port = 7777

    nofiles = 0
    realIpHeader = "X-Forwarded-For"

    info {
        name = "llamenos relay"
        description = "Private relay for Llamenos hub events"
        pubkey = ""
        contact = ""
        icon = ""
        nips = ""
    }

    maxWebsocketPayloadSize = 65536
    maxReqFilterSize = 50
    autoPingSeconds = 30
    enableTcpKeepalive = true
    queryTimesliceBudgetMicroseconds = 5000
    maxFilterLimit = 100
    maxSubsPerConnection = 10

    writePolicy {
        # Whitelist server pubkey only — rejects events from unknown publishers.
        # ALLOWED_PUBKEY env var must be set to the server's derived Nostr pubkey.
        plugin = "/app/write-policy.sh"
    }

    compression {
        enabled = true
        slidingWindow = true
    }

    logging {
        dumpInAll = false
        dumpInEvents = false
        dumpInReqs = false
        dbScanPerf = false
        invalidEvents = true
    }

    numThreads {
        ingester = 3
        reqWorker = 3
        reqMonitor = 3
        negentropy = 2
    }

    negentropy {
        enabled = true
        maxSyncEvents = 1000000
    }
}
