# Llamenos Self-Hosted Docker Compose
#
# Core services (always start):
#   app    - Llamenos application (Node.js)
#   caddy  - Reverse proxy with automatic TLS
#   minio  - S3-compatible blob storage
#
# Optional services (via --profile):
#   whisper   - Self-hosted transcription (profile: transcription)
#   asterisk  - Self-hosted PBX (profile: asterisk)
#   asterisk-bridge - ARI-to-webhook translator (profile: asterisk)
#   signal-cli - Signal messaging bridge (profile: signal)
#
# Usage:
#   cp .env.example .env && edit .env
#   docker compose up -d                               # Core only
#   docker compose --profile transcription up -d        # + Whisper
#   docker compose --profile asterisk up -d             # + Asterisk
#   docker compose --profile signal up -d               # + Signal
#   COMPOSE_PROFILES=transcription,signal docker compose up -d

name: llamenos

services:
  # ── Core ──────────────────────────────────────────────────
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    volumes:
      - app-data:/app/data
    environment:
      - PLATFORM=node
      - PORT=3000
      - DATA_DIR=/app/data
      - ADMIN_PUBKEY=${ADMIN_PUBKEY}
      - HOTLINE_NAME=${HOTLINE_NAME:-Hotline}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET=${MINIO_BUCKET:-llamenos-files}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:8080/v1/audio/transcriptions}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
    networks:
      - web
      - internal
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-}
    networks:
      - web
    depends_on:
      app:
        condition: service_healthy

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Optional: Whisper Transcription ───────────────────────
  whisper:
    image: fedirz/faster-whisper-server:latest
    profiles: ["transcription"]
    restart: unless-stopped
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-base}
      - WHISPER__DEVICE=${WHISPER_DEVICE:-cpu}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Optional: Asterisk PBX ───────────────────────────────
  asterisk:
    image: andrius/asterisk:latest
    profiles: ["asterisk"]
    restart: unless-stopped
    ports:
      - "5060:5060/udp"
      - "5060:5060/tcp"
    volumes:
      - asterisk-config:/etc/asterisk
    networks:
      - internal
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  asterisk-bridge:
    profiles: ["asterisk"]
    build:
      context: ../..
      dockerfile: asterisk-bridge/Dockerfile
    restart: unless-stopped
    environment:
      - ARI_URL=ws://asterisk:8088/ari/events
      - WORKER_WEBHOOK_URL=http://app:3000
      - BRIDGE_SECRET=${BRIDGE_SECRET:-changeme}
    networks:
      - internal
    depends_on:
      asterisk:
        condition: service_healthy
      app:
        condition: service_healthy

  # ── Optional: Signal Messaging ───────────────────────────
  signal-cli:
    image: bbernhard/signal-cli-rest-api:latest
    profiles: ["signal"]
    restart: unless-stopped
    environment:
      - MODE=json-rpc
      - AUTO_RECEIVE_SCHEDULE=0 * * * *
    volumes:
      - signal-data:/home/.local/share/signal-cli
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/about"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  app-data:
  caddy-data:
  caddy-config:
  minio-data:
  asterisk-config:
  signal-data:

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true
