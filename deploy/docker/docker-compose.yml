# Llamenos Self-Hosted Docker Compose
#
# Core services (always start):
#   app      - Llamenos application (Node.js)
#   postgres - PostgreSQL database
#   caddy    - Reverse proxy with automatic TLS
#   minio    - S3-compatible blob storage
#
# Optional services (via --profile):
#   whisper   - Self-hosted transcription (profile: transcription)
#   asterisk  - Self-hosted PBX (profile: asterisk)
#   asterisk-bridge - ARI-to-webhook translator (profile: asterisk)
#   signal-cli - Signal messaging bridge (profile: signal)
#
# Usage:
#   cp .env.example .env && edit .env
#   docker compose up -d                               # Core only
#   docker compose --profile transcription up -d        # + Whisper
#   docker compose --profile asterisk up -d             # + Asterisk
#   docker compose --profile signal up -d               # + Signal
#   COMPOSE_PROFILES=transcription,signal docker compose up -d
#
# IMPORTANT: You MUST set PG_PASSWORD, MINIO_ACCESS_KEY, MINIO_SECRET_KEY,
# and BRIDGE_SECRET (if using Asterisk) in your .env file before starting.

name: llamenos

services:
  # ── Core ──────────────────────────────────────────────────
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    environment:
      - PLATFORM=node
      - PORT=3000
      - DATABASE_URL=postgresql://llamenos:${PG_PASSWORD:?PG_PASSWORD is required}@postgres:5432/llamenos
      - PG_POOL_SIZE=${PG_POOL_SIZE:-10}
      - ADMIN_PUBKEY=${ADMIN_PUBKEY:?ADMIN_PUBKEY is required}
      - HOTLINE_NAME=${HOTLINE_NAME:-Hotline}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - "HMAC_SECRET=${HMAC_SECRET:?HMAC_SECRET is required — generate with openssl rand -hex 32}"
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      - MINIO_BUCKET=${MINIO_BUCKET:-llamenos-files}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:8080/v1/audio/transcriptions}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      # Nostr relay (Epic 76.1) — enable with --profile nostr
      - SERVER_NOSTR_SECRET=${SERVER_NOSTR_SECRET:-}
      - NOSTR_RELAY_URL=${NOSTR_RELAY_URL:-ws://strfry:7777}
    networks:
      - web
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17-alpine@sha256:3430fe182f5065a6ea505c3d432d2c7fff18fbab954df8f277c1dbf4c70124af
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=llamenos
      - POSTGRES_USER=llamenos
      - POSTGRES_PASSWORD=${PG_PASSWORD:?PG_PASSWORD is required}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llamenos -d llamenos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2.9-alpine@sha256:b4e3952384eb9524a887633ce65c752dd7c71314d2c2acf98cd5c715aaa534f0
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-}
    networks:
      - web
    depends_on:
      app:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z@sha256:ed9be66eb5f2636c18289c34c3b725ddf57815f2777c77b5938543b78a44f144
    command: server /data --console-address ":9001"
    restart: unless-stopped
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Optional: Nostr Relay (strfry) ────────────────────────
  strfry:
    image: dockurr/strfry:latest
    profiles: ["nostr"]
    restart: unless-stopped
    volumes:
      - nostr-data:/app/strfry-db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7777"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Optional: Whisper Transcription ───────────────────────
  whisper:
    image: fedirz/faster-whisper-server:0.4.1  # TODO: pin to digest when available
    profiles: ["transcription"]
    restart: unless-stopped
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-base}
      - WHISPER__DEVICE=${WHISPER_DEVICE:-cpu}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Optional: Asterisk PBX ───────────────────────────────
  asterisk:
    image: andrius/asterisk@sha256:e30df5ec1b512827bf3cffc49b8000b07376a05c950736d028348eba80035015 # 20.x
    profiles: ["asterisk"]
    restart: unless-stopped
    volumes:
      - asterisk-config:/etc/asterisk
    networks:
      - internal
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  asterisk-bridge:
    profiles: ["asterisk"]
    build:
      context: ../..
      dockerfile: asterisk-bridge/Dockerfile
    restart: unless-stopped
    environment:
      - ARI_URL=ws://asterisk:8088/ari/events
      - ARI_USERNAME=${ARI_USERNAME:-llamenos}
      - ARI_PASSWORD=${ARI_PASSWORD:?ARI_PASSWORD is required — do NOT use the default}
      - WORKER_WEBHOOK_URL=http://app:3000
      - BRIDGE_SECRET=${BRIDGE_SECRET:?BRIDGE_SECRET is required — generate a random value}
    networks:
      - internal
    depends_on:
      asterisk:
        condition: service_healthy
      app:
        condition: service_healthy

  # ── Optional: Signal Messaging ───────────────────────────
  signal-cli:
    image: bbernhard/signal-cli-rest-api:0.92@sha256:702db336aa1a87611595e66755c9ccf65b24c25589857301eabef1d46056b3c5
    profiles: ["signal"]
    restart: unless-stopped
    environment:
      - MODE=json-rpc
      - AUTO_RECEIVE_SCHEDULE=0 * * * *
    volumes:
      - signal-data:/home/.local/share/signal-cli
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/about"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  minio-data:
  nostr-data:
  asterisk-config:
  signal-data:

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true
