# Llamenos Self-Hosted Docker Compose
#
# Core services (always start):
#   app      - Llamenos application (Bun)
#   postgres - PostgreSQL database
#   caddy    - Reverse proxy with automatic TLS
#   rustfs   - S3-compatible object storage (RustFS)
#   strfry   - Nostr relay for real-time events
#
# Optional services (via --profile):
#   whisper    - Self-hosted transcription (profile: transcription)
#   asterisk   - Self-hosted PBX (profile: asterisk)
#   sip-bridge - PBX-to-webhook translator (profile: asterisk)
#   kamailio   - SIP proxy / load balancer (profile: telephony)
#   coturn     - STUN/TURN relay for WebRTC (profile: telephony)
#   signal-cli - Signal messaging bridge (profile: signal)
#   glitchtip  - Sentry-compatible error tracking (profile: monitoring)
#
# Usage:
#   cp .env.example .env && edit .env
#   docker compose up -d                               # Core (includes relay)
#   docker compose --profile transcription up -d        # + Whisper
#   docker compose --profile asterisk up -d             # + Asterisk
#   docker compose --profile telephony up -d            # + Kamailio + CoTURN
#   docker compose --profile signal up -d               # + Signal
#   docker compose --profile monitoring up -d            # + GlitchTip
#   COMPOSE_PROFILES=asterisk,telephony,signal docker compose up -d
#
# IMPORTANT: You MUST set PG_PASSWORD, STORAGE_ACCESS_KEY, STORAGE_SECRET_KEY,
# and BRIDGE_SECRET (if using Asterisk) in your .env file before starting.

name: llamenos

services:
  # ── Core ──────────────────────────────────────────────────
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    environment:
      - PLATFORM=bun
      - PORT=3000
      - DATABASE_URL=postgresql://llamenos:${PG_PASSWORD:?PG_PASSWORD is required}@postgres:5432/llamenos
      - PG_POOL_SIZE=${PG_POOL_SIZE:-10}
      - ADMIN_PUBKEY=${ADMIN_PUBKEY:?ADMIN_PUBKEY is required}
      - HOTLINE_NAME=${HOTLINE_NAME:-Hotline}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - "HMAC_SECRET=${HMAC_SECRET:?HMAC_SECRET is required — generate with openssl rand -hex 32}"
      - STORAGE_ENDPOINT=http://rustfs:9000
      - STORAGE_ACCESS_KEY=${STORAGE_ACCESS_KEY:?STORAGE_ACCESS_KEY is required}
      - STORAGE_SECRET_KEY=${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY is required}
      - STORAGE_BUCKET=${STORAGE_BUCKET:-llamenos-files}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:8080/v1/audio/transcriptions}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      # Nostr relay — required for all real-time events (presence, calls, messages)
      - "SERVER_NOSTR_SECRET=${SERVER_NOSTR_SECRET:?SERVER_NOSTR_SECRET is required — generate with openssl rand -hex 32}"
      - NOSTR_RELAY_URL=${NOSTR_RELAY_URL:-ws://strfry:7777}
      # Optional: GlitchTip/Sentry DSN for client crash reporting (profile: monitoring)
      - GLITCHTIP_DSN=${GLITCHTIP_DSN:-}
      # Signal notification sidecar (profile: signal)
      - NOTIFIER_URL=${NOTIFIER_URL:-http://signal-notifier:3100}
      - NOTIFIER_API_KEY=${NOTIFIER_API_KEY:-}
    networks:
      - web
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      rustfs:
        condition: service_healthy
      strfry:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "llamenos-app"
    healthcheck:
      # oven/bun:1-slim has no curl — use bun's built-in fetch
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/api/health/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:17-alpine@sha256:3430fe182f5065a6ea505c3d432d2c7fff18fbab954df8f277c1dbf4c70124af
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=llamenos
      - POSTGRES_USER=llamenos
      - POSTGRES_PASSWORD=${PG_PASSWORD:?PG_PASSWORD is required}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llamenos -d llamenos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2.9-alpine@sha256:b4e3952384eb9524a887633ce65c752dd7c71314d2c2acf98cd5c715aaa534f0
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-}
    networks:
      - web
    depends_on:
      app:
        condition: service_healthy

  rustfs:
    image: rustfs/rustfs:latest@sha256:0725587f6fcca83c1898f321424327d6e6da5e01ea20382905dd258ed5af3be4
    command: server /data --console-address ":9001"
    restart: unless-stopped
    volumes:
      - rustfs-data:/data
    environment:
      - RUSTFS_ACCESS_KEY=${STORAGE_ACCESS_KEY:?STORAGE_ACCESS_KEY is required}
      - RUSTFS_SECRET_KEY=${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY is required}
      - RUSTFS_CONSOLE_ENABLE=true
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9000/ || test $? -eq 22"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Core: Nostr Relay (strfry) ────────────────────────────
  strfry:
    # dockurr/strfry:1.0.1 pinned 2026-03-21
    image: dockurr/strfry:1.0.1@sha256:4bcfddc8aab07e17d35198c0618d6a9c8e5d3e27b211741ebce9f7058cdd1e21
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    volumes:
      - nostr-data:/app/strfry-db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7777"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Optional: Whisper Transcription ───────────────────────
  whisper:
    # fedirz/faster-whisper-server:0.4.1 — digest pin pending: tag not yet published to Docker Hub
    # Run: docker pull fedirz/faster-whisper-server:0.4.1 && docker inspect --format='{{index .RepoDigests 0}}' fedirz/faster-whisper-server:0.4.1
    image: fedirz/faster-whisper-server:0.4.1
    profiles: ["transcription"]
    restart: unless-stopped
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-base}
      - WHISPER__DEVICE=${WHISPER_DEVICE:-cpu}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Optional: Asterisk PBX ───────────────────────────────
  asterisk:
    image: andrius/asterisk@sha256:e30df5ec1b512827bf3cffc49b8000b07376a05c950736d028348eba80035015 # 20.x
    profiles: ["asterisk"]
    restart: unless-stopped
    volumes:
      - ./asterisk-config:/etc/asterisk:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  sip-bridge:
    profiles: ["asterisk"]
    build:
      context: ../../sip-bridge
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PBX_TYPE=${PBX_TYPE:-asterisk}
      - ARI_URL=ws://asterisk:8088/ari/events
      - ARI_USERNAME=${ARI_USERNAME:-llamenos}
      - ARI_PASSWORD=${ARI_PASSWORD:?ARI_PASSWORD is required — do NOT use the default}
      - WORKER_WEBHOOK_URL=http://app:3000
      - BRIDGE_SECRET=${BRIDGE_SECRET:?BRIDGE_SECRET is required — generate a random value}
      - BRIDGE_HOST=0.0.0.0
    networks:
      - internal
    depends_on:
      asterisk:
        condition: service_healthy
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Optional: Kamailio SIP Proxy (telephony profile) ──────
  kamailio:
    image: kamailio/kamailio:5.7
    profiles: ["telephony"]
    restart: unless-stopped
    ports:
      - "${SIP_UDP_PORT:-5060}:5060/udp"
      - "${SIP_TCP_PORT:-5060}:5060/tcp"
      - "${SIPS_PORT:-5061}:5061/tcp"
    volumes:
      - ./kamailio/kamailio.cfg:/etc/kamailio/kamailio.cfg:ro
      - ./kamailio/dispatcher.list:/etc/kamailio/dispatcher.list:ro
    networks:
      - internal
    depends_on:
      asterisk:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kamcmd", "core.version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Optional: CoTURN STUN/TURN relay (telephony profile) ──
  coturn:
    image: coturn/coturn:4
    profiles: ["telephony"]
    restart: unless-stopped
    ports:
      - "${TURN_UDP_PORT:-3478}:3478/udp"
      - "${TURN_TCP_PORT:-3478}:3478/tcp"
    command: >
      --realm=${DOMAIN:-localhost}
      --fingerprint
      --lt-cred-mech
      --user=llamenos:${TURN_SECRET:-changeme}
      --no-tls
      --no-dtls
    networks:
      - internal
    healthcheck:
      test: ["CMD", "turnutils_uclient", "-T", "localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Optional: GlitchTip Error Tracking ────────────────────
  # Sentry-compatible error tracking. Clients send crash reports here.
  # Enable with: docker compose --profile monitoring up -d
  glitchtip:
    image: glitchtip/glitchtip:v4.1@sha256:6bfe449e0fa0fec0e9a41c8ee7c4d87c889f2e1cda1084ae31c0af99b4e73b0c
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://llamenos:${PG_PASSWORD:?PG_PASSWORD is required}@postgres:5432/glitchtip
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:?GLITCHTIP_SECRET_KEY is required — set to a 64-char random hex value (openssl rand -hex 32)}
      - PORT=8000
      - EMAIL_URL=${GLITCHTIP_EMAIL_URL:-consolemail://}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN:-http://localhost:8000}
      - DEFAULT_FROM_EMAIL=${GLITCHTIP_FROM_EMAIL:-noreply@localhost}
      - CELERY_WORKER_AUTOSCALE=1,3
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=10000
    networks:
      - web
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/_health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.1@sha256:6bfe449e0fa0fec0e9a41c8ee7c4d87c889f2e1cda1084ae31c0af99b4e73b0c
    profiles: ["monitoring"]
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment:
      - DATABASE_URL=postgresql://llamenos:${PG_PASSWORD:?PG_PASSWORD is required}@postgres:5432/glitchtip
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:?GLITCHTIP_SECRET_KEY is required — set to a 64-char random hex value (openssl rand -hex 32)}
      - EMAIL_URL=${GLITCHTIP_EMAIL_URL:-consolemail://}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN:-http://localhost:8000}
      - DEFAULT_FROM_EMAIL=${GLITCHTIP_FROM_EMAIL:-noreply@localhost}
      - CELERY_WORKER_AUTOSCALE=1,3
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=10000
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy

  glitchtip-redis:
    image: redis:7-alpine@sha256:de15e464122c0f7614b968f33c6c3e0e3b0f3da563e3e5f3e9e19f9a4c4d8e1a
    profiles: ["monitoring"]
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Optional: Signal Messaging + Notifications ──────────
  signal-cli:
    image: bbernhard/signal-cli-rest-api:0.92@sha256:702db336aa1a87611595e66755c9ccf65b24c25589857301eabef1d46056b3c5
    profiles: ["signal"]
    restart: unless-stopped
    environment:
      - MODE=json-rpc
      - AUTO_RECEIVE_SCHEDULE=0 * * * *
    volumes:
      - signal-data:/home/.local/share/signal-cli
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/about"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  signal-notifier:
    profiles: ["signal"]
    build:
      context: ../../signal-notifier
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - PORT=3100
      - "NOTIFIER_API_KEY=${NOTIFIER_API_KEY:?NOTIFIER_API_KEY is required when signal profile is active — generate with openssl rand -hex 32}"
      - "NOTIFIER_TOKEN_SECRET=${NOTIFIER_TOKEN_SECRET:-${HMAC_SECRET}}"
      - SIGNAL_BRIDGE_URL=http://signal-cli:8080
      - SIGNAL_BRIDGE_API_KEY=${SIGNAL_BRIDGE_API_KEY:-}
      - "SIGNAL_REGISTERED_NUMBER=${SIGNAL_REGISTERED_NUMBER:?SIGNAL_REGISTERED_NUMBER is required — your registered Signal phone number}"
      - NOTIFIER_DB_PATH=/app/data/notifier.db
    volumes:
      - signal-notifier-data:/app/data
    networks:
      - internal
    depends_on:
      signal-cli:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:3100/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  rustfs-data:
  nostr-data:
  signal-data:
  signal-notifier-data:

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true
