# Llamenos Self-Hosted Docker Compose
#
# Core services (always start):
#   app      - Llamenos application (Node.js)
#   postgres - PostgreSQL database
#   caddy    - Reverse proxy with automatic TLS
#   minio    - S3-compatible blob storage
#   strfry   - Nostr relay for real-time events
#
# Optional services (via --profile):
#   whisper   - Self-hosted transcription (profile: transcription)
#   asterisk  - Self-hosted PBX (profile: asterisk)
#   asterisk-bridge - ARI-to-webhook translator (profile: asterisk)
#   signal-cli - Signal messaging bridge (profile: signal)
#   glitchtip  - Sentry-compatible error tracking (profile: monitoring)
#
# Usage:
#   cp .env.example .env && edit .env
#   docker compose up -d                               # Core (includes relay)
#   docker compose --profile transcription up -d        # + Whisper
#   docker compose --profile asterisk up -d             # + Asterisk
#   docker compose --profile signal up -d               # + Signal
#   docker compose --profile monitoring up -d            # + GlitchTip
#   COMPOSE_PROFILES=transcription,signal docker compose up -d
#
# IMPORTANT: You MUST set PG_PASSWORD, MINIO_ACCESS_KEY, MINIO_SECRET_KEY,
# and BRIDGE_SECRET (if using Asterisk) in your .env file before starting.

name: llamenos

services:
  # ── Core ──────────────────────────────────────────────────
  app:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    environment:
      - PLATFORM=node
      - PORT=3000
      - DATABASE_URL=postgresql://llamenos:${PG_PASSWORD:?PG_PASSWORD is required}@postgres:5432/llamenos
      - PG_POOL_SIZE=${PG_POOL_SIZE:-10}
      - ADMIN_PUBKEY=${ADMIN_PUBKEY:?ADMIN_PUBKEY is required}
      - HOTLINE_NAME=${HOTLINE_NAME:-Hotline}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - "HMAC_SECRET=${HMAC_SECRET:?HMAC_SECRET is required — generate with openssl rand -hex 32}"
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      - MINIO_BUCKET=${MINIO_BUCKET:-llamenos-files}
      - WHISPER_URL=${WHISPER_URL:-http://whisper:8080/v1/audio/transcriptions}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER:-}
      # Nostr relay — required for all real-time events (presence, calls, messages)
      - "SERVER_NOSTR_SECRET=${SERVER_NOSTR_SECRET:?SERVER_NOSTR_SECRET is required — generate with openssl rand -hex 32}"
      - NOSTR_RELAY_URL=${NOSTR_RELAY_URL:-ws://strfry:7777}
      # Optional: GlitchTip/Sentry DSN for client crash reporting (profile: monitoring)
      - GLITCHTIP_DSN=${GLITCHTIP_DSN:-}
    networks:
      - web
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      strfry:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
        tag: "llamenos-app"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17-alpine@sha256:3430fe182f5065a6ea505c3d432d2c7fff18fbab954df8f277c1dbf4c70124af
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=llamenos
      - POSTGRES_USER=llamenos
      - POSTGRES_PASSWORD=${PG_PASSWORD:?PG_PASSWORD is required}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U llamenos -d llamenos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2.9-alpine@sha256:b4e3952384eb9524a887633ce65c752dd7c71314d2c2acf98cd5c715aaa534f0
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
      - "${HTTPS_PORT:-443}:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      - DOMAIN=${DOMAIN:-localhost}
      - ACME_EMAIL=${ACME_EMAIL:-}
    networks:
      - web
    depends_on:
      app:
        condition: service_healthy

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z@sha256:ed9be66eb5f2636c18289c34c3b725ddf57815f2777c77b5938543b78a44f144
    command: server /data --console-address ":9001"
    restart: unless-stopped
    volumes:
      - minio-data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:?MINIO_ACCESS_KEY is required}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Core: Nostr Relay (strfry) ────────────────────────────
  strfry:
    # Pin to specific tag for reproducible deployments
    # Check https://hub.docker.com/r/dockurr/strfry/tags for latest stable version
    # TODO: pin to digest after pulling — run: docker pull dockurr/strfry:1.0.1 && docker inspect --format='{{index .RepoDigests 0}}' dockurr/strfry:1.0.1
    image: dockurr/strfry:1.0.1
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 1000000
        hard: 1000000
    volumes:
      - nostr-data:/app/strfry-db
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7777"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Optional: Whisper Transcription ───────────────────────
  whisper:
    # TODO: pin to digest after pulling — run: docker pull fedirz/faster-whisper-server:0.4.1 && docker inspect --format='{{index .RepoDigests 0}}' fedirz/faster-whisper-server:0.4.1
    image: fedirz/faster-whisper-server:0.4.1
    profiles: ["transcription"]
    restart: unless-stopped
    environment:
      - WHISPER__MODEL=${WHISPER_MODEL:-Systran/faster-whisper-base}
      - WHISPER__DEVICE=${WHISPER_DEVICE:-cpu}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── Optional: Asterisk PBX ───────────────────────────────
  asterisk:
    image: andrius/asterisk@sha256:e30df5ec1b512827bf3cffc49b8000b07376a05c950736d028348eba80035015 # 20.x
    profiles: ["asterisk"]
    restart: unless-stopped
    volumes:
      - asterisk-config:/etc/asterisk
    networks:
      - internal
    healthcheck:
      test: ["CMD", "asterisk", "-rx", "core show version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  asterisk-bridge:
    profiles: ["asterisk"]
    build:
      context: ../..
      dockerfile: asterisk-bridge/Dockerfile
    restart: unless-stopped
    environment:
      - ARI_URL=ws://asterisk:8088/ari/events
      - ARI_USERNAME=${ARI_USERNAME:-llamenos}
      - ARI_PASSWORD=${ARI_PASSWORD:?ARI_PASSWORD is required — do NOT use the default}
      - WORKER_WEBHOOK_URL=http://app:3000
      - BRIDGE_SECRET=${BRIDGE_SECRET:?BRIDGE_SECRET is required — generate a random value}
    networks:
      - internal
    depends_on:
      asterisk:
        condition: service_healthy
      app:
        condition: service_healthy

  # ── Optional: GlitchTip Error Tracking ────────────────────
  # Sentry-compatible error tracking. Clients send crash reports here.
  # Enable with: docker compose --profile monitoring up -d
  glitchtip:
    image: glitchtip/glitchtip:v4.1@sha256:6bfe449e0fa0fec0e9a41c8ee7c4d87c889f2e1cda1084ae31c0af99b4e73b0c
    profiles: ["monitoring"]
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://llamenos:${PG_PASSWORD:?PG_PASSWORD is required}@postgres:5432/glitchtip
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:-change-me-to-a-random-string}
      - PORT=8000
      - EMAIL_URL=${GLITCHTIP_EMAIL_URL:-consolemail://}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN:-http://localhost:8000}
      - DEFAULT_FROM_EMAIL=${GLITCHTIP_FROM_EMAIL:-noreply@localhost}
      - CELERY_WORKER_AUTOSCALE=1,3
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=10000
    networks:
      - web
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/_health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  glitchtip-worker:
    image: glitchtip/glitchtip:v4.1@sha256:6bfe449e0fa0fec0e9a41c8ee7c4d87c889f2e1cda1084ae31c0af99b4e73b0c
    profiles: ["monitoring"]
    restart: unless-stopped
    command: ./bin/run-celery-with-beat.sh
    environment:
      - DATABASE_URL=postgresql://llamenos:${PG_PASSWORD:?PG_PASSWORD is required}@postgres:5432/glitchtip
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:-change-me-to-a-random-string}
      - EMAIL_URL=${GLITCHTIP_EMAIL_URL:-consolemail://}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN:-http://localhost:8000}
      - DEFAULT_FROM_EMAIL=${GLITCHTIP_FROM_EMAIL:-noreply@localhost}
      - CELERY_WORKER_AUTOSCALE=1,3
      - CELERY_WORKER_MAX_TASKS_PER_CHILD=10000
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
      glitchtip-redis:
        condition: service_healthy

  glitchtip-redis:
    image: redis:7-alpine@sha256:de15e464122c0f7614b968f33c6c3e0e3b0f3da563e3e5f3e9e19f9a4c4d8e1a
    profiles: ["monitoring"]
    restart: unless-stopped
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Optional: Signal Messaging ───────────────────────────
  signal-cli:
    image: bbernhard/signal-cli-rest-api:0.92@sha256:702db336aa1a87611595e66755c9ccf65b24c25589857301eabef1d46056b3c5
    profiles: ["signal"]
    restart: unless-stopped
    environment:
      - MODE=json-rpc
      - AUTO_RECEIVE_SCHEDULE=0 * * * *
    volumes:
      - signal-data:/home/.local/share/signal-cli
    networks:
      - internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/about"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  minio-data:
  nostr-data:
  asterisk-config:
  signal-data:

networks:
  web:
    driver: bridge
  internal:
    driver: bridge
    internal: true
