#!KAMAILIO
# ============================================================
# Kamailio Configuration for Llamenos
# ============================================================
# Minimal SIP proxy config for development/testing.
# Routes inbound SIP to Asterisk via the dispatcher module.
# Replace with a hardened production config before going live.
# ============================================================

####### Global Parameters #########

debug=2
log_stderror=no
log_facility=LOG_LOCAL0

fork=yes
children=4

# Listen on all interfaces for UDP and TCP
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060

####### Modules Section ########

loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "textops.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "dispatcher.so"

# ----- dispatcher params -----
modparam("dispatcher", "list_file", "/etc/kamailio/dispatcher.list")
modparam("dispatcher", "flags", 2)
modparam("dispatcher", "ds_ping_interval", 10)

####### Routing Logic ########

request_route {
    # Per-request initial checks
    route(REQINIT);

    # Handle retransmissions to avoid duplicate processing
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Handle requests within SIP dialogs
    route(WITHINDLG);

    # Only initial requests (no To-tag)
    loose_route();

    route(REQINIT);

    # Record-route for dialog-forming requests
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Dispatch to Asterisk backend
    route(DISPATCH);
}

route[REQINIT] {
    if (!sanity_check("1511", "7")) {
        xlog("Malformed SIP message from $si:$sp\n");
        exit;
    }

    if (is_method("OPTIONS")) {
        sl_send_reply("200", "OK");
        exit;
    }

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483", "Too Many Hops");
        exit;
    }
}

route[WITHINDLG] {
    if (has_totag()) {
        if (loose_route()) {
            route(RELAY);
        } else {
            sl_send_reply("404", "Not Found");
        }
        exit;
    }
}

route[DISPATCH] {
    # Use dispatcher group 1 (defined in dispatcher.list)
    if (!ds_select_dst("1", "4")) {
        xlog("L_ERR", "No active Asterisk destinations available\n");
        sl_send_reply("500", "Service Unavailable");
        exit;
    }
    route(RELAY);
}

route[RELAY] {
    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

onreply_route {
    exit;
}
