# Docker Compose override for E2E tests
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build app
#   # Then wait for health: timeout 120 bash -c 'until curl -sf http://localhost:3000/api/health; do sleep 2; done'
#
# Changes from production:
#   - Exposes app port 3000 directly (bypasses Caddy)
#   - Sets ENVIRONMENT=development (enables /api/test-reset endpoint)
#   - Disables read_only to allow SQLite WAL files in tmpfs
#   - Fixes strfry NOFILES config for CI (default 1M exceeds GitHub Actions ulimit of 65536)
#   - Configures signal-notifier and sip-bridge in test mode

services:
  # Fix strfry for CI: mount config with nofiles=0 (don't attempt to set ulimit)
  # Override ulimits from base compose (1M exceeds GitHub Actions limit of 65536)
  # Expose port 7777 so backend-bdd relay tests can connect from the test process host.
  strfry:
    ports:
      - "7777:7777"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - ./strfry-test.conf:/etc/strfry.conf:ro

  app:
    ports:
      - "${APP_PORT:-3000}:3000"
    read_only: false
    environment:
      - ENVIRONMENT=development
      - DEMO_MODE=true
      - DEV_RESET_SECRET=test-reset-secret
      # Wire up sidecar services so integration tests can reach them
      - NOTIFIER_URL=http://signal-notifier:3100
      - NOTIFIER_API_KEY=${NOTIFIER_API_KEY:-ci-test-notifier-key}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      strfry:
        condition: service_healthy

  # ── Signal sidecar: test mode ──────────────────────────────────────
  # signal-cli runs in json-rpc mode; AUTO_RECEIVE_SCHEDULE disabled in CI
  # so the webhook-based tests control message flow entirely.
  # Healthcheck: in CI no Signal number is registered so /v1/about returns 503.
  # Override to just check the process is listening (TCP check on port 8080).
  signal-cli:
    environment:
      - MODE=json-rpc
      - AUTO_RECEIVE_SCHEDULE=
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/about || true"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # signal-notifier: expose port so BDD tests can hit /health and /notify directly.
  # Don't depend on signal-cli being healthy — in CI it has no registered number.
  signal-notifier:
    ports:
      - "3100:3100"
    depends_on:
      signal-cli:
        condition: service_started
    environment:
      - PORT=3100
      - NOTIFIER_API_KEY=${NOTIFIER_API_KEY:-ci-test-notifier-key}
      - NOTIFIER_TOKEN_SECRET=${NOTIFIER_TOKEN_SECRET:-ci-test-token-secret}
      - SIGNAL_BRIDGE_URL=http://signal-cli:8080
      - SIGNAL_REGISTERED_NUMBER=${SIGNAL_REGISTERED_NUMBER:-+15550000000}
      - NOTIFIER_DB_PATH=/tmp/notifier-test.db

  # ── Asterisk sidecar: test mode ────────────────────────────────────
  # sip-bridge points to the mock ARI endpoint; BRIDGE_SECRET and
  # ARI_PASSWORD come from .env (set to ci-test-* values in CI).
  sip-bridge:
    environment:
      - ARI_URL=ws://asterisk:8088/ari/events
      - ARI_USERNAME=llamenos
      - ARI_PASSWORD=${ARI_PASSWORD:-ci-test-ari-password}
      - WORKER_WEBHOOK_URL=http://app:3000
      - BRIDGE_SECRET=${BRIDGE_SECRET:-ci-test-bridge-secret}
