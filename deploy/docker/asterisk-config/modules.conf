; ============================================================
; Asterisk Module Configuration
; ============================================================
; Load only the modules needed for ARI + PJSIP operation.
; The bridge service manages all call control via ARI —
; no CDR, CEL, or legacy chan_sip needed.
;
; Place this file in /etc/asterisk/modules.conf
; ============================================================

[modules]
autoload = yes

; Disable modules not needed for ARI bridge operation
noload = chan_sip.so
noload = chan_skinny.so
noload = chan_mgcp.so
noload = chan_iax2.so
noload = chan_oss.so
noload = chan_alsa.so
noload = chan_phone.so
noload = app_voicemail.so
noload = app_queue.so
noload = app_followme.so
noload = app_page.so
noload = app_directory.so
noload = app_minivm.so
noload = cdr_csv.so
noload = cdr_custom.so
noload = cdr_manager.so
noload = cdr_syslog.so
noload = cel_custom.so
noload = cel_manager.so
noload = cel_odbc.so
noload = pbx_dundi.so
noload = res_config_ldap.so
noload = res_config_pgsql.so
noload = res_config_sqlite3.so
noload = res_config_mysql.so
noload = res_config_odbc.so
noload = res_phoneprov.so
noload = res_smdi.so
noload = res_fax.so
noload = res_fax_spandsp.so
