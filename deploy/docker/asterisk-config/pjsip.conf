; ============================================================
; PJSIP Transport Configuration for Llamenos
; ============================================================
; Only transport stanzas live here. SIP trunk objects (auth,
; aor, endpoint, registration) are written at bridge startup
; via the ARI dynamic config API when SIP_PROVIDER,
; SIP_USERNAME, and SIP_PASSWORD are set in the environment.
; ============================================================

; ----------------------------------------------------------
; Transport — UDP on port 5060
; ----------------------------------------------------------
[transport-udp]
type = transport
protocol = udp
bind = 0.0.0.0:5060

; ----------------------------------------------------------
; Transport — TCP on port 5060
; ----------------------------------------------------------
[transport-tcp]
type = transport
protocol = tcp
bind = 0.0.0.0:5060

; ----------------------------------------------------------
; Transport — TLS on port 5061 (uncomment for production)
; ----------------------------------------------------------
;[transport-tls]
;type = transport
;protocol = tls
;bind = 0.0.0.0:5061
;cert_file = /etc/asterisk/keys/asterisk.pem
;ca_list_file = /etc/asterisk/keys/ca.crt
;method = tlsv1_2

; ----------------------------------------------------------
; Transport — WSS on port 8089 (WebRTC browser clients)
; SIP-over-WebSocket signaling for JsSIP browser UA.
; Caddy terminates TLS in production; for local dev, Asterisk
; serves WSS directly with self-signed or mkcert certs.
; ----------------------------------------------------------
[transport-wss]
type = transport
protocol = wss
bind = 0.0.0.0:8089
