; Sorcery configuration for Llamenos — enables ARI dynamic config for PJSIP
;
; Transport objects use the default config wizard (loaded from pjsip.conf).
; Auth, AOR, endpoint, and contact use the in-memory wizard for ARI dynamic
; config. The bridge reconfigures these on every startup.
;
; NOTE: registration is intentionally omitted — Asterisk 22.x crashes (SIGSEGV)
; when registration uses the memory wizard. Registration objects are still
; written via ARI dynamic config but use the default config backend.

[general]

[res_pjsip]
auth=memory
aor=memory
endpoint=memory
contact=memory
