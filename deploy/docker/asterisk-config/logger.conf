; ============================================================
; Asterisk Logger Configuration
; ============================================================
; Minimal logging config for Llamenos.
; Console output goes to Docker logs; no file-based logging
; (the container filesystem is ephemeral).
;
; Place this file in /etc/asterisk/logger.conf
; ============================================================

[general]
dateformat = %F %T.%3q

[logfiles]
; Log to console (stdout) — captured by Docker logging driver
console => notice,warning,error
