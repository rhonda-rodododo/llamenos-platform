[package]
name = "llamenos-core"
version = "0.2.0"
edition = "2021"
description = "Shared cryptographic core for Llamenos — Ed25519/X25519, HPKE (RFC 9180), AES-256-GCM, sigchain"
license = "AGPL-3.0-or-later"
repository = "https://github.com/rhonda-rodododo/llamenos-platform"

[package.metadata.wasm-pack.profile.release]
wasm-opt = false

[lib]
crate-type = ["lib", "cdylib", "staticlib"]

[dependencies]
# Ed25519 signing
ed25519-dalek = { version = "2", features = ["rand_core"] }

# X25519 key agreement
x25519-dalek = { version = "2", features = ["static_secrets"] }

# HPKE: DHKEM(X25519, HKDF-SHA256) + HKDF-SHA256 + AES-256-GCM
hpke = { version = "0.13", default-features = false, features = ["x25519", "alloc"] }

# AES-256-GCM (standalone symmetric operations — PIN encryption, items_key)
aes-gcm = "0.10"

# Key derivation
hkdf = "0.12"
pbkdf2 = { version = "0.12", features = ["simple"] }

# Hashing
sha2 = "0.10"
hmac = "0.12"

# Memory safety for key material
zeroize = { version = "1", features = ["derive"] }

# Unicode normalization (for blind index canonicalization)
unicode-normalization = "0.1"

# Date/time (for blind index epoch bucketing)
chrono = { version = "0.4", default-features = false, features = ["alloc"] }

# Encoding
hex = "0.4"
base64 = "0.22"

# Randomness
rand = "0.8"
getrandom = "0.2"

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Error handling
thiserror = "2"

# UniFFI for Swift/Kotlin bindings
uniffi = { version = "0.28", optional = true }

# WASM bindings for web browser
wasm-bindgen = { version = "0.2", optional = true }
serde-wasm-bindgen = { version = "0.6", optional = true }
js-sys = { version = "0.3", optional = true }

# MLS (RFC 9420) — feature-gated, not compiled by default
openmls = { version = "0.8", features = ["openmls_rust_crypto"], optional = true }
openmls_rust_crypto = { version = "0.5", optional = true }
openmls_basic_credential = { version = "0.5", optional = true }
openmls_memory_storage = { version = "0.5", optional = true }
openmls_traits = { version = "0.5", optional = true }

# Legacy dependencies (kept for legacy.rs during transition — removed in Phase 6)
k256 = { version = "0.13", features = ["ecdh", "schnorr", "serde"] }
elliptic-curve = { version = "0.13", features = ["sec1"] }
bech32 = "0.11"
chacha20poly1305 = "0.10"

[features]
default = []
mls = ["dep:openmls", "dep:openmls_rust_crypto", "dep:openmls_basic_credential", "dep:openmls_memory_storage", "dep:openmls_traits"]
mobile = ["dep:uniffi", "mls"]
uniffi-bindgen = ["mobile", "uniffi/cli"]
wasm = ["dep:wasm-bindgen", "dep:serde-wasm-bindgen", "dep:js-sys", "getrandom/js"]

[[bin]]
name = "uniffi-bindgen"
required-features = ["uniffi-bindgen"]

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom = { version = "0.2", features = ["js"] }

[dev-dependencies]
serde_json = "1"

[profile.release]
lto = true
codegen-units = 1
strip = true

# UniFFI bindgen needs unstripped binary to read metadata symbols.
# Use this profile when generating bindings: cargo build --profile release-bindgen
[profile.release-bindgen]
inherits = "release"
strip = false
