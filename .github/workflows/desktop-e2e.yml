# CI workflow for desktop Playwright E2E tests.
# Runs Playwright tests against a Vite build with mocked Tauri IPC.
#
# Trigger: PRs touching apps/desktop/, src/client/, tests/, or packages/, manual dispatch.
# Epic 88: Desktop & Mobile E2E Tests.

name: Desktop E2E Tests

on:
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'packages/crypto/**'
      - 'packages/protocol/**'
      - 'packages/shared/**'
      - 'tests/**'
      - 'src/client/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            os_label: Linux
          - platform: windows-latest
            os_label: Windows

    runs-on: ${{ matrix.platform }}
    name: E2E (${{ matrix.os_label }})
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lockb') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      # Linux needs xvfb for headless Chromium
      - name: Run desktop E2E tests (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        run: xvfb-run bash scripts/test-desktop.sh
        env:
          CI: "true"
          PLAYWRIGHT_TEST: "true"

      # Windows: invoke bash explicitly for the shell script
      - name: Run desktop E2E tests (Windows)
        if: matrix.platform == 'windows-latest'
        run: bash scripts/test-desktop.sh
        shell: bash
        env:
          CI: "true"
          PLAYWRIGHT_TEST: "true"
