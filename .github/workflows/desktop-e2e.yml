# CI workflow for desktop Playwright E2E tests.
# Runs Playwright tests against a Vite build with mocked Tauri IPC.
# Backend services (PostgreSQL, MinIO, strfry) via Docker Compose — globalSetup
# requires a running backend for state reset and admin bootstrap.
#
# Trigger: PRs touching apps/desktop/, src/client/, tests/, or packages/, manual dispatch.
# Epic 88: Desktop & Mobile E2E Tests.
#
# Note: Windows matrix removed — Docker Compose backend is not reliably available
# on Windows GHA runners. The ci.yml e2e job provides Linux coverage on ALL PRs;
# this workflow adds path-filtered coverage with the test-desktop.sh pipeline.

name: Desktop E2E Tests

on:
  pull_request:
    paths:
      - 'apps/desktop/**'
      - 'packages/crypto/**'
      - 'packages/protocol/**'
      - 'packages/shared/**'
      - 'tests/**'
      - 'src/client/**'
  workflow_dispatch:

permissions:
  contents: read

env:
  BUN_VERSION: "1.3.5"
  TEST_ADMIN_PUBKEY: "ac4718373d30301e5c7cf55e9e6f2568efb94f3278fb88f37f4981e880505228"

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            os_label: Linux

    runs-on: ${{ matrix.platform }}
    name: E2E (${{ matrix.os_label }})
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lockb') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright deps (cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      # ── Start backend services ──────────────────────────────────
      - name: Create .env for Docker Compose
        run: |
          printf '%s\n' \
            "ADMIN_PUBKEY=${{ env.TEST_ADMIN_PUBKEY }}" \
            "DOMAIN=localhost" \
            "PG_PASSWORD=ci-test-password" \
            "HMAC_SECRET=$(openssl rand -hex 32)" \
            "STORAGE_ACCESS_KEY=testaccess" \
            "STORAGE_SECRET_KEY=testsecret123456" \
            "HOTLINE_NAME=Llámenos" \
            "BRIDGE_SECRET=ci-test-bridge-secret" \
            "ARI_PASSWORD=ci-test-ari-password" \
            "SERVER_NOSTR_SECRET=$(openssl rand -hex 32)" \
            "NOTIFIER_API_KEY=ci-test-notifier-key" \
            "SIGNAL_REGISTERED_NUMBER=+15550000000" \
            "PBX_TYPE=asterisk" \
            "GLITCHTIP_SECRET_KEY=$(openssl rand -hex 32)" \
            > .env

      - name: Build and start Docker Compose (core services)
        run: |
          docker compose --env-file .env \
            -f deploy/docker/docker-compose.yml \
            -f deploy/docker/docker-compose.test.yml \
            up -d --build --wait app
        timeout-minutes: 10

      - name: Wait for backend health
        run: |
          echo "Waiting for backend to be ready..."
          for i in $(seq 1 60); do
            if curl -sf http://localhost:3000/api/health/ready; then
              echo "Backend is ready"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Backend did not become healthy after 120s"
              docker compose --env-file .env \
                -f deploy/docker/docker-compose.yml \
                -f deploy/docker/docker-compose.test.yml \
                logs --tail=50 || true
              exit 1
            fi
            sleep 2
          done

      # ── Run tests ───────────────────────────────────────────────
      - name: Run desktop E2E tests
        run: xvfb-run bash scripts/test-desktop.sh
        env:
          CI: "true"
          PLAYWRIGHT_TEST: "true"
          E2E_TEST_SECRET: "test-reset-secret"

      - name: Upload Playwright report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: desktop-e2e-playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Tear down Docker Compose
        if: always()
        run: |
          docker compose --env-file .env \
            -f deploy/docker/docker-compose.yml \
            -f deploy/docker/docker-compose.test.yml \
            down -v
