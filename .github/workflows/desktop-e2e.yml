# CI workflow for desktop (Tauri) E2E tests.
# Runs WebdriverIO tests against the Tauri debug binary.
#
# Trigger: PRs touching src-tauri/ or tests/desktop/, manual dispatch.
# Epic 88: Desktop & Mobile E2E Tests.

name: Desktop E2E Tests

on:
  pull_request:
    paths:
      - 'src-tauri/**'
      - 'tests/desktop/**'
      - 'src/client/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            os_label: Linux
          - platform: windows-latest
            os_label: Windows

    runs-on: ${{ matrix.platform }}
    name: E2E (${{ matrix.os_label }})
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          workspaces: src-tauri

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            webkit2gtk-driver \
            xvfb

      # Install msedgedriver on Windows for WebView2 testing
      - name: Install msedgedriver (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          cargo install --git https://github.com/nicollasricas/msedgedriver-tool
          & "$HOME/.cargo/bin/msedgedriver-tool.exe"
          $PWD.Path >> $env:GITHUB_PATH
        shell: pwsh

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Replace local path dep with git dep so Cargo fetches from GitHub
      - name: Use llamenos-core from GitHub
        shell: bash
        run: sed -i 's|llamenos-core = { path = "../../llamenos-core" }|llamenos-core = { git = "https://github.com/rhonda-rodododo/llamenos-core.git" }|' src-tauri/Cargo.toml

      # wdio.conf.ts onPrepare() handles building the debug binary

      # Run tests on Linux with xvfb for headless display
      - name: Run desktop E2E tests (Linux)
        if: matrix.platform == 'ubuntu-24.04'
        env:
          WEBKIT_DISABLE_COMPOSITING_MODE: "1"
          WEBKIT_DISABLE_DMABUF_RENDERER: "1"
        run: xvfb-run bun run test:desktop

      # Run tests on Windows directly
      - name: Run desktop E2E tests (Windows)
        if: matrix.platform == 'windows-latest'
        run: bun run test:desktop
