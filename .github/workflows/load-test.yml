name: Load Test

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Load test scenario'
        required: true
        type: choice
        options:
          - calls
          - messages
          - mixed
          - burst
          - all
        default: mixed
      duration_multiplier:
        description: 'Duration multiplier (e.g., 0.5 for half, 2 for double)'
        required: false
        type: string
        default: '1'

jobs:
  load-test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: llamenos
          POSTGRES_PASSWORD: llamenos-test
          POSTGRES_DB: llamenos
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: latest

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D68
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Install dependencies
        run: bun install

      - name: Build backend
        run: bun run build:node

      - name: Start backend
        env:
          PLATFORM: node
          ENVIRONMENT: development
          DATABASE_URL: postgres://llamenos:llamenos-test@localhost:5432/llamenos
          TEST_SECRET: ci-test-secret
          HMAC_SECRET: ci-hmac-secret-for-load-testing
        run: |
          bun run start:node &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Backend ready"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Run load test
        env:
          BASE_URL: http://localhost:3000
          TEST_SECRET: ci-test-secret
          SCENARIO: ${{ inputs.scenario }}
          DURATION_MULTIPLIER: ${{ inputs.duration_multiplier }}
        run: |
          ARGS=("${SCENARIO}" --out json=load-test-results.json)
          if [ "${DURATION_MULTIPLIER}" != "1" ]; then
            ARGS+=(--duration-multiplier "${DURATION_MULTIPLIER}")
          fi
          tests/load/run.sh "${ARGS[@]}"

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: load-test-results-${{ github.run_number }}
          path: load-test-results.json
          retention-days: 30
