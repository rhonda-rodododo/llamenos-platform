# Continuous Integration & Deployment
#
# On every push to main:
#   1. Detect changed files — skip E2E/version/deploy for docs-only changes
#   2. Build & validate (typecheck, vite build, esbuild, site build)
#   3. E2E tests against Cloudflare Workers (wrangler dev / miniflare)
#   4. E2E tests against Docker Compose (Node.js self-hosted platform)
#   5. Auto-determine version bump from conventional commits
#   6. Bump version, generate changelog, commit + tag
#   7. Deploy app to Cloudflare Workers + marketing site to Cloudflare Pages
#   8. Create GitHub Release with changelog
#
# Docs-only changes (*.md and site/ files) skip E2E tests, versioning, and app deploy.
# Site changes still deploy to Pages even without a version bump.
# Everything else (app code, CI, config, etc.) triggers the full E2E → deploy chain.
# The created tag also triggers docker.yml for Docker image builds.

name: CI

on:
  push:
    branches: [main]

# Only one CI run at a time on main
concurrency:
  group: ci-main
  cancel-in-progress: false

env:
  BUN_VERSION: "1.3.5"
  # Test admin keypair (derived from ADMIN_NSEC in tests/helpers.ts)
  TEST_ADMIN_PUBKEY: "ac4718373d30301e5c7cf55e9e6f2568efb94f3278fb88f37f4981e880505228"

jobs:
  # ─── Detect Changed Files ─────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    outputs:
      app: ${{ steps.filter.outputs.app }}
      site: ${{ steps.filter.outputs.site }}
      docs_only: ${{ steps.filter.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 2

      - name: Detect changes
        id: filter
        run: |
          # Get changed files between HEAD^ and HEAD
          CHANGED=$(git diff --name-only HEAD^ HEAD 2>/dev/null || git diff --name-only HEAD)

          echo "Changed files:"
          echo "$CHANGED"

          # Patterns for files that DON'T need E2E tests (inverted logic)
          # Only markdown files and site/ files can skip E2E. Everything else triggers it.
          SKIP_E2E_PATTERN="\.md$|^site/"

          # Check if ALL changed files match the skip pattern
          DOCS_ONLY="true"
          SITE_CHANGED="false"
          while IFS= read -r file; do
            [[ -z "$file" ]] && continue
            if [[ "$file" == site/* ]]; then
              SITE_CHANGED="true"
            fi
            if ! echo "$file" | grep -qE "$SKIP_E2E_PATTERN"; then
              DOCS_ONLY="false"
              echo "Non-docs file changed: $file"
            fi
          done <<< "$CHANGED"

          echo "app=$([ "$DOCS_ONLY" = "false" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
          echo "site=$SITE_CHANGED" >> "$GITHUB_OUTPUT"
          echo "docs_only=$DOCS_ONLY" >> "$GITHUB_OUTPUT"

          if [[ "$DOCS_ONLY" == "true" ]]; then
            echo "Only docs/site files changed — E2E tests will be skipped"
          else
            echo "App/infra files changed — E2E tests required"
          fi

  # ─── Build & Validate ──────────────────────────────────────
  build:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install site dependencies
        run: cd site && bun install --frozen-lockfile

      - name: Set build-time constants (Epic 79)
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> $GITHUB_ENV

      - name: Typecheck
        run: bun run typecheck

      - name: Build frontend
        run: bun run build

      - name: Build Node.js server
        run: bun run build:node

      - name: Capture Worker bundle (Epic 79)
        run: bunx wrangler deploy --dry-run --outdir dist/worker-bundle/
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Compute build checksums (Epic 79)
        run: |
          cd dist
          find client server -type f -exec sha256sum {} \; | sort > ../CHECKSUMS.txt
          cd ..
          if [ -d dist/worker-bundle ]; then
            sha256sum dist/worker-bundle/* >> CHECKSUMS.txt
          fi
          sha256sum bun.lockb >> CHECKSUMS.txt
          echo "$(wc -l < CHECKSUMS.txt) files checksummed"

      - name: Build marketing site
        run: bun run site:build

      # Upload build artifacts for deploy jobs
      - name: Upload app build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: app-build
          path: dist/
          retention-days: 1

      - name: Upload checksums
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: checksums
          path: CHECKSUMS.txt
          retention-days: 7

      - name: Upload site build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: site-build
          path: site/dist/
          retention-days: 1

  # ─── Dependency Vulnerability Scan ───────────────────────────
  audit:
    needs: changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          # bun audit requires >= 1.3
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit dependencies
        # Only block on critical vulnerabilities — high-severity transitive deps
        # (e.g. minimatch in vite-plugin-pwa/shadcn) can't be fixed without upstream updates
        run: bun audit --audit-level=critical

  # ─── E2E Tests: Cloudflare Workers (wrangler dev) ──────────
  e2e-cf:
    needs: [changes, build]
    # Skip E2E when only docs/site files changed
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create .dev.vars for tests
        run: |
          printf 'ADMIN_PUBKEY=%s\nENVIRONMENT=development\nHMAC_SECRET=%s\n' "${{ env.TEST_ADMIN_PUBKEY }}" "$(openssl rand -hex 32)" > .dev.vars

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lockb') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Run E2E tests (Cloudflare Workers)
        run: bunx playwright test
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: e2e-cf-results
          path: |
            playwright-report/
            test-results/
          retention-days: 1

  # ─── E2E Tests: Docker Compose (Node.js platform) ─────────
  e2e-docker:
    needs: [changes, build]
    # Skip E2E when only docs/site files changed
    if: needs.changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('bun.lockb') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: bunx playwright install --with-deps chromium

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: bunx playwright install-deps chromium

      - name: Create .env for Docker Compose
        run: |
          printf '%s\n' \
            "ADMIN_PUBKEY=${{ env.TEST_ADMIN_PUBKEY }}" \
            "DOMAIN=localhost" \
            "PG_PASSWORD=ci-test-password" \
            "HMAC_SECRET=$(openssl rand -hex 32)" \
            "MINIO_ACCESS_KEY=testaccess" \
            "MINIO_SECRET_KEY=testsecret123456" \
            "HOTLINE_NAME=Llámenos" \
            "BRIDGE_SECRET=ci-test-bridge-secret" \
            "ARI_PASSWORD=ci-test-ari-password" \
            "SERVER_NOSTR_SECRET=$(openssl rand -hex 32)" \
            > deploy/docker/.env

      - name: Build and start Docker Compose
        working-directory: deploy/docker
        run: |
          # Don't use --wait (it checks ALL containers, including strfry which is disabled
          # but would crash in CI due to NOFILES ulimit). Instead, wait for app only.
          docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build app
        timeout-minutes: 10

      - name: Wait for app to be healthy
        run: |
          echo "Waiting for app to be healthy..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000/api/health >/dev/null 2>&1; do sleep 2; done'
          echo "App is healthy and ready for E2E tests"

      - name: Show container status
        if: ${{ !cancelled() }}
        working-directory: deploy/docker
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml ps
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs --tail=50

      - name: Run E2E tests (Docker / Node.js)
        run: bunx playwright test --config playwright.docker.config.ts

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: e2e-docker-results
          path: |
            playwright-report/
            test-results/
          retention-days: 1

      - name: Tear down Docker Compose
        if: always()
        working-directory: deploy/docker
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

  # ─── Version Bump & Changelog ──────────────────────────────
  version:
    needs: [changes, build, audit, e2e-cf, e2e-docker]
    # Skip version bump for docs-only changes; require E2E success for app changes
    if: |
      always() &&
      needs.changes.outputs.docs_only != 'true' &&
      needs.build.result == 'success' &&
      needs.audit.result == 'success' &&
      needs.e2e-cf.result == 'success' &&
      needs.e2e-docker.result == 'success'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      old_version: ${{ steps.version.outputs.old_version }}
      bump_type: ${{ steps.version.outputs.bump_type }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump from commits
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --oneline --format="%s")
          fi

          # No commits since last tag means this IS the tag commit — skip
          if [ -z "$COMMITS" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No new commits since last tag. Skipping release."
            exit 0
          fi

          echo "Commits since ${LATEST_TAG:-beginning}:"
          echo "$COMMITS"

          # Determine bump type from conventional commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
            BUMP="minor"
          fi

          # Read current version
          OLD_VERSION=$(node -p "require('./package.json').version")

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VERSION"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Version: $OLD_VERSION → $NEW_VERSION ($BUMP)"

      - name: Install git-cliff
        if: steps.version.outputs.should_release == 'true'
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz -o /tmp/git-cliff.tar.gz
          echo "d9705c9f43bd74e2d10ca7df10b624bbe6f15bd4774f6c1e012db5be276f91f7  /tmp/git-cliff.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin --strip-components=1 -f /tmp/git-cliff.tar.gz git-cliff-2.7.0/git-cliff
          rm /tmp/git-cliff.tar.gz

      - name: Bump version in package.json
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Bump Helm chart appVersion
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          sed -i "s/^appVersion:.*/appVersion: \"$NEW_VERSION\"/" deploy/helm/llamenos/Chart.yaml

      - name: Generate changelog and commit release
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage version files
          git add package.json deploy/helm/llamenos/Chart.yaml

          # Create tag so git-cliff can generate notes for this version
          git commit -m "chore(release): v${NEW_VERSION} [skip ci]"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"

          # Generate full CHANGELOG.md (includes the new tag)
          git-cliff --output CHANGELOG.md

          # Amend the release commit to include the changelog
          git add CHANGELOG.md
          git commit --amend --no-edit

          # Move the tag to the amended commit
          git tag -f -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"

      - name: Push release
        if: steps.version.outputs.should_release == 'true'
        run: |
          # Rebase onto any commits pushed during E2E tests
          git pull --rebase origin main
          git push origin main --follow-tags

  # ─── Deploy App to Cloudflare Workers ───────────────────────
  deploy-app:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download app build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: app-build
          path: dist/

      - name: Inject build-time constants into Worker config (Epic 79)
        run: |
          VERSION="${{ needs.version.outputs.new_version }}"
          BUILD_TIME=$(date -d "@$(git log -1 --format=%ct)" -Iseconds 2>/dev/null || date -u +%Y-%m-%dT%H:%M:%S+00:00)
          node -e "
            const fs = require('fs');
            let cfg = fs.readFileSync('wrangler.jsonc', 'utf-8');
            cfg = cfg.replace(/\"__BUILD_VERSION__\":\s*\"[^\"]*\"/, '\"__BUILD_VERSION__\": \"' + \"'${VERSION}'\" + '\"');
            cfg = cfg.replace(/\"__BUILD_COMMIT__\":\s*\"[^\"]*\"/, '\"__BUILD_COMMIT__\": \"' + \"'${GITHUB_SHA}'\" + '\"');
            cfg = cfg.replace(/\"__BUILD_TIME__\":\s*\"[^\"]*\"/, '\"__BUILD_TIME__\": \"' + \"'${BUILD_TIME}'\" + '\"');
            fs.writeFileSync('wrangler.jsonc', cfg);
          "

      - name: Deploy Worker
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── Deploy Site to Cloudflare Pages ────────────────────────
  # Deploy when: (1) there's a versioned release, OR (2) site files changed
  deploy-site:
    needs: [changes, build, version]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.version.outputs.should_release == 'true' || needs.changes.outputs.site == 'true')
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download site build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: site-build
          path: site/dist/

      - name: Deploy to Cloudflare Pages
        run: bunx wrangler pages deploy site/dist/ --project-name llamenos-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── Create GitHub Release ──────────────────────────────────
  release:
    needs: [version, deploy-app]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write  # Required for SLSA attestation
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download checksums
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: checksums

      - name: Download app build (for attestation)
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: app-build
          path: dist/

      - name: Generate SLSA build provenance (Epic 79)
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v2.1.0
        with:
          subject-path: |
            CHECKSUMS.txt
            dist/client/**/*.js
            dist/client/**/*.css

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz -o /tmp/git-cliff.tar.gz
          echo "d9705c9f43bd74e2d10ca7df10b624bbe6f15bd4774f6c1e012db5be276f91f7  /tmp/git-cliff.tar.gz" | sha256sum -c -
          tar xz -C /usr/local/bin --strip-components=1 -f /tmp/git-cliff.tar.gz git-cliff-2.7.0/git-cliff
          rm /tmp/git-cliff.tar.gz

      - name: Generate release notes
        run: |
          git-cliff --latest --strip header > RELEASE_NOTES.md
          echo "--- Release notes ---"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: v${{ needs.version.outputs.new_version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
          files: |
            CHECKSUMS.txt
