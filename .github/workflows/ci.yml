# Continuous Integration & Deployment
#
# On every push to main:
#   1. Build & validate (typecheck, vite build, esbuild, site build)
#   2. E2E tests against Cloudflare Workers (wrangler dev / miniflare)
#   3. E2E tests against Docker Compose (Node.js self-hosted platform)
#   4. Auto-determine version bump from conventional commits
#   5. Bump version, generate changelog, commit + tag
#   6. Deploy app to Cloudflare Workers + marketing site to Cloudflare Pages
#   7. Create GitHub Release with changelog
#
# E2E tests MUST pass before any version bump, deployment, or release.
# The created tag also triggers docker.yml for Docker image builds.

name: CI

on:
  push:
    branches: [main]

# Only one CI run at a time on main
concurrency:
  group: ci-main
  cancel-in-progress: false

env:
  BUN_VERSION: "1.2"
  # Test admin keypair (derived from ADMIN_NSEC in tests/helpers.ts)
  TEST_ADMIN_PUBKEY: "ac4718373d30301e5c7cf55e9e6f2568efb94f3278fb88f37f4981e880505228"

jobs:
  # ─── Build & Validate ──────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    # Skip commits made by this workflow (version bumps, changelog updates)
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install site dependencies
        run: cd site && bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build frontend
        run: bun run build

      - name: Build Node.js server
        run: bun run build:node

      - name: Build marketing site
        run: bun run site:build

      # Upload build artifacts for deploy jobs
      - name: Upload app build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: app-build
          path: dist/
          retention-days: 1

      - name: Upload site build
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: site-build
          path: site/dist/
          retention-days: 1

  # ─── E2E Tests: Cloudflare Workers (wrangler dev) ──────────
  e2e-cf:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create .dev.vars for tests
        run: |
          printf 'ADMIN_PUBKEY=%s\nENVIRONMENT=development\n' "${{ env.TEST_ADMIN_PUBKEY }}" > .dev.vars

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests (Cloudflare Workers)
        run: bunx playwright test
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: e2e-cf-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # ─── E2E Tests: Docker Compose (Node.js platform) ─────────
  e2e-docker:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Create .env for Docker Compose
        run: |
          printf '%s\n' \
            "ADMIN_PUBKEY=${{ env.TEST_ADMIN_PUBKEY }}" \
            "DOMAIN=localhost" \
            "MINIO_ACCESS_KEY=testaccess" \
            "MINIO_SECRET_KEY=testsecret123456" \
            "HOTLINE_NAME=Llámenos" \
            "BRIDGE_SECRET=ci-test-bridge-secret" \
            > deploy/docker/.env

      - name: Build and start Docker Compose
        working-directory: deploy/docker
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml up -d --build --wait app
        timeout-minutes: 10

      - name: Show container status
        if: ${{ !cancelled() }}
        working-directory: deploy/docker
        run: |
          docker compose -f docker-compose.yml -f docker-compose.test.yml ps
          docker compose -f docker-compose.yml -f docker-compose.test.yml logs app --tail=50

      - name: Verify app health
        run: |
          curl -sf http://localhost:3000/api/health
          echo ""
          echo "App is healthy!"

      - name: Run E2E tests (Docker / Node.js)
        run: bunx playwright test --config playwright.docker.config.ts

      - name: Upload test results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: ${{ !cancelled() }}
        with:
          name: e2e-docker-results
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Tear down Docker Compose
        if: always()
        working-directory: deploy/docker
        run: docker compose -f docker-compose.yml -f docker-compose.test.yml down -v

  # ─── Version Bump & Changelog ──────────────────────────────
  version:
    needs: [build, e2e-cf, e2e-docker]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      new_version: ${{ steps.version.outputs.new_version }}
      old_version: ${{ steps.version.outputs.old_version }}
      bump_type: ${{ steps.version.outputs.bump_type }}
      should_release: ${{ steps.version.outputs.should_release }}

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump from commits
        id: version
        run: |
          # Get the latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [ -z "$LATEST_TAG" ]; then
            COMMITS=$(git log --oneline --format="%s")
          else
            COMMITS=$(git log "${LATEST_TAG}..HEAD" --oneline --format="%s")
          fi

          # No commits since last tag means this IS the tag commit — skip
          if [ -z "$COMMITS" ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "No new commits since last tag. Skipping release."
            exit 0
          fi

          echo "Commits since ${LATEST_TAG:-beginning}:"
          echo "$COMMITS"

          # Determine bump type from conventional commits
          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "^feat(\(.*\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
            BUMP="minor"
          fi

          # Read current version
          OLD_VERSION=$(node -p "require('./package.json').version")

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$OLD_VERSION"
          case "$BUMP" in
            major) NEW_VERSION="$((MAJOR + 1)).0.0" ;;
            minor) NEW_VERSION="${MAJOR}.$((MINOR + 1)).0" ;;
            patch) NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))" ;;
          esac

          echo "bump_type=$BUMP" >> "$GITHUB_OUTPUT"
          echo "old_version=$OLD_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"
          echo "Version: $OLD_VERSION → $NEW_VERSION ($BUMP)"

      - name: Install git-cliff
        if: steps.version.outputs.should_release == 'true'
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin --strip-components=1 git-cliff-2.7.0/git-cliff

      - name: Bump version in package.json
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          node -e "
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Bump Helm chart appVersion
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          sed -i "s/^appVersion:.*/appVersion: \"$NEW_VERSION\"/" deploy/helm/llamenos/Chart.yaml

      - name: Generate changelog and commit release
        if: steps.version.outputs.should_release == 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage version files
          git add package.json deploy/helm/llamenos/Chart.yaml

          # Create tag so git-cliff can generate notes for this version
          git commit -m "chore(release): v${NEW_VERSION}"
          git tag -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"

          # Generate full CHANGELOG.md (includes the new tag)
          git-cliff --output CHANGELOG.md

          # Amend the release commit to include the changelog
          git add CHANGELOG.md
          git commit --amend --no-edit

          # Move the tag to the amended commit
          git tag -f -a "v${NEW_VERSION}" -m "Release v${NEW_VERSION}"

      - name: Push release
        if: steps.version.outputs.should_release == 'true'
        run: |
          git push origin main --follow-tags

  # ─── Deploy App to Cloudflare Workers ───────────────────────
  deploy-app:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Download app build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: app-build
          path: dist/

      - name: Deploy Worker
        run: bunx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── Deploy Site to Cloudflare Pages ────────────────────────
  deploy-site:
    needs: version
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Download site build
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: site-build
          path: site/dist/

      - name: Deploy to Cloudflare Pages
        run: bunx wrangler pages deploy site/dist/ --project-name llamenos-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ─── Create GitHub Release ──────────────────────────────────
  release:
    needs: [version, deploy-app, deploy-site]
    if: needs.version.outputs.should_release == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Install git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz \
            | tar xz -C /usr/local/bin --strip-components=1 git-cliff-2.7.0/git-cliff

      - name: Generate release notes
        run: |
          git-cliff --latest --strip header > RELEASE_NOTES.md
          echo "--- Release notes ---"
          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: v${{ needs.version.outputs.new_version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
