# CI workflow for desktop (Tauri) release builds.
# Builds signed desktop apps for macOS, Windows, and Linux (AppImage, deb, Flatpak).
# Generates latest.json manifest for auto-updater.
#
# Trigger: push to tags matching v* or manual dispatch.
# Epics 87, 97: Desktop Auto-Updater & Release Pipeline.

name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: universal-apple-darwin
            os_label: macOS
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            os_label: Windows
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            os_label: Linux

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.os_label }})

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # macOS universal binary needs both targets
      - name: Add macOS aarch64 target
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          workspaces: |
            apps/desktop

      - name: Install Linux deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: "1.3.5"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Sync version from tag into tauri.conf.json and package.json
      - name: Sync version from tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "Building version: ${VERSION}"

          # Update tauri.conf.json
          node -e "
            const fs = require('fs');
            const conf = JSON.parse(fs.readFileSync('apps/desktop/tauri.conf.json', 'utf-8'));
            conf.version = '${VERSION}';
            fs.writeFileSync('apps/desktop/tauri.conf.json', JSON.stringify(conf, null, 2) + '\n');
          "

          # Update package.json (for Vite build metadata)
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf-8'));
            pkg.version = '${VERSION}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      # macOS code signing
      - name: Setup macOS signing
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          if [ -n "$APPLE_CERTIFICATE" ]; then
            KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
            echo "::add-mask::$KEYCHAIN_PASSWORD"
            echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
            security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
            rm certificate.p12
          fi

      # Build Tauri app
      - name: Build (macOS universal)
        if: matrix.platform == 'macos-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bun run tauri:build -- --target universal-apple-darwin

      - name: Build (Windows)
        if: matrix.platform == 'windows-latest'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri:build

      - name: Build (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run tauri:build

      # Upload build artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tauri-${{ matrix.os_label }}
          path: |
            apps/desktop/target/**/release/bundle/**/*.app.tar.gz
            apps/desktop/target/**/release/bundle/**/*.app.tar.gz.sig
            apps/desktop/target/**/release/bundle/**/*.dmg
            apps/desktop/target/**/release/bundle/**/*.nsis.zip
            apps/desktop/target/**/release/bundle/**/*.nsis.zip.sig
            apps/desktop/target/**/release/bundle/**/*.AppImage
            apps/desktop/target/**/release/bundle/**/*.AppImage.sig
            apps/desktop/target/**/release/bundle/**/*.deb
          retention-days: 5

  # ─── Flatpak Build ────────────────────────────────────────────
  build-flatpak:
    runs-on: ubuntu-latest
    name: Build (Flatpak)

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # Note: Flatpak manifest builds from the monorepo — packages/crypto is in-repo.

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@92ae9851ad316786193b1fd3f40c4b51eb5cb101 # v6.6
        with:
          bundle: llamenos-hotline.flatpak
          manifest-path: flatpak/org.llamenos.Hotline.yml
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: tauri-Flatpak
          path: llamenos-hotline.flatpak
          retention-days: 5

  # ─── Publish Release ──────────────────────────────────────────
  release:
    needs: [build, build-flatpak]
    runs-on: ubuntu-latest
    name: Publish Release

    # Run even if Flatpak fails (it's a new build target, may have issues)
    if: always() && needs.build.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f | sort

      # Flatten artifacts to a single directory for the manifest script
      - name: Flatten artifact structure
        run: |
          mkdir -p flat-artifacts
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sig' -o -name '*.nsis.zip' -o -name '*.nsis.zip.sig' -o -name '*.AppImage' -o -name '*.AppImage.sig' -o -name '*.dmg' -o -name '*.deb' -o -name '*.flatpak' \) -exec cp {} flat-artifacts/ \;
          ls -la flat-artifacts/

      # Generate update manifest
      - name: Generate latest.json
        run: ./scripts/generate-update-manifest.sh flat-artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Determine version for release
      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${GITHUB_REF_NAME#v}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      # Create GitHub Release (or add to existing release from ci.yml)
      - name: Upload desktop artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v${VERSION}"

          # Check if release already exists (created by ci.yml)
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" &>/dev/null; then
            echo "Release ${TAG} exists — uploading desktop artifacts..."
            gh release upload "${TAG}" \
              flat-artifacts/* \
              latest.json \
              --clobber
          else
            echo "Creating new release ${TAG}..."
            gh release create "${TAG}" \
              --title "v${VERSION}" \
              --generate-notes \
              flat-artifacts/* \
              latest.json
          fi
