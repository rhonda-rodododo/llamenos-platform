# CI workflow for mobile (iOS + Android) release builds.
# Builds signed mobile apps and uploads to TestFlight / Play Store.
#
# Trigger: push to tags matching v* or manual dispatch.
# Epic 210: Mobile Release Prep.

name: Mobile Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  # ─── Android Release ─────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    name: Build (Android)
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Java 17
        uses: actions/setup-java@c5195efecefb84a719a2088d2e2cbb5e11e18908 # v4.7.1
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: gradle/actions/setup-gradle@ac638b010cf58a27ee6c972d69a9da8bc5f6e75c # v4.4.1

      - name: Install Rust stable (for crypto build)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Rust cache
        uses: swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          workspaces: packages/crypto

      # Build llamenos-core for Android (when build-mobile.sh is ready)
      # - name: Build crypto for Android
      #   run: |
      #     cd packages/crypto
      #     ./scripts/build-mobile.sh android
      #     cp -r dist/android/jniLibs/* ../../apps/android/app/src/main/jniLibs/

      - name: Decode keystore
        if: env.KEYSTORE_BASE64 != ''
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > apps/android/release.keystore

      - name: Sync version from tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "Building version: ${VERSION}"

          # Update versionName in build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${VERSION}\"/" apps/android/app/build.gradle.kts

          # Increment versionCode based on run number (always increasing)
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.run_number }}/" apps/android/app/build.gradle.kts

      - name: Build release AAB
        working-directory: apps/android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/apps/android/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Build release APK
        working-directory: apps/android
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/apps/android/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Upload AAB artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: android-release
          path: |
            apps/android/app/build/outputs/bundle/release/*.aab
            apps/android/app/build/outputs/apk/release/*.apk
            apps/android/app/build/outputs/mapping/release/mapping.txt
          retention-days: 30

      - name: Upload to Play Store (internal track)
        if: secrets.PLAY_SERVICE_ACCOUNT != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT }}
          packageName: org.llamenos.hotline
          releaseFiles: apps/android/app/build/outputs/bundle/release/*.aab
          track: internal
          mappingFile: apps/android/app/build/outputs/mapping/release/mapping.txt

      - name: Upload Android artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="v${{ github.event.inputs.version }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          # Find the APK
          APK=$(find apps/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" &>/dev/null; then
              gh release upload "${TAG}" "$APK" --clobber
            fi
          fi

  # ─── iOS Release ──────────────────────────────────────────────
  build-ios:
    runs-on: macos-latest
    name: Build (iOS)
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Rust stable (for crypto build)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim

      - name: Rust cache
        uses: swatinem/rust-cache@82a92a6e8fbeee089604da2575dc567ae9ddeaab # v2.7.5
        with:
          workspaces: packages/crypto

      # Build llamenos-core for iOS (when build-mobile.sh is ready)
      # - name: Build crypto for iOS
      #   run: |
      #     cd packages/crypto
      #     ./scripts/build-mobile.sh ios

      - name: Sync version from tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "Building version: ${VERSION}"

          # Update CFBundleShortVersionString in Info.plist
          sed -i '' "s|<key>CFBundleShortVersionString</key>[[:space:]]*<string>[^<]*</string>|<key>CFBundleShortVersionString</key>\n\t<string>${VERSION}</string>|" apps/ios/Sources/App/Info.plist

          # Use run number as build number
          sed -i '' "s|<key>CFBundleVersion</key>[[:space:]]*<string>[^<]*</string>|<key>CFBundleVersion</key>\n\t<string>${{ github.run_number }}</string>|" apps/ios/Sources/App/Info.plist

      - name: Setup Apple signing
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          # Import certificate
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm certificate.p12

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/build.mobileprovision

      - name: Resolve Swift packages
        working-directory: apps/ios
        run: swift package resolve

      - name: Build archive
        working-directory: apps/ios
        run: |
          xcodebuild archive \
            -scheme Llamenos \
            -sdk iphoneos \
            -configuration Release \
            -archivePath build/Llamenos.xcarchive \
            -allowProvisioningUpdates \
            CODE_SIGN_STYLE=Automatic \
            INFOPLIST_FILE=Sources/App/Info.plist \
            | xcpretty || true

      - name: Export IPA
        if: success()
        working-directory: apps/ios
        run: |
          cat > build/ExportOptions.plist << 'EXPORTEOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EXPORTEOF

          xcodebuild -exportArchive \
            -archivePath build/Llamenos.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/export \
            -allowProvisioningUpdates \
            | xcpretty || true

      - name: Upload IPA artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: success()
        with:
          name: ios-release
          path: |
            apps/ios/build/export/*.ipa
            apps/ios/build/Llamenos.xcarchive/dSYMs/
          retention-days: 30

      - name: Upload to TestFlight
        if: success() && env.APPLE_API_KEY != ''
        env:
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          # Decode API key
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

          # Upload via altool
          IPA=$(find apps/ios/build/export -name "*.ipa" | head -1)
          if [ -n "$IPA" ]; then
            xcrun altool --upload-app \
              --type ios \
              --file "$IPA" \
              --apiKey "$APPLE_API_KEY_ID" \
              --apiIssuer "$APPLE_API_ISSUER_ID"
          fi

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
