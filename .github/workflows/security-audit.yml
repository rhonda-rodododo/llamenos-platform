# Security Audit Workflow (Epic 297)
#
# Runs on:
#   - Daily schedule (2:00 AM UTC)
#   - Push to main (when security-relevant files change)
#   - Manual dispatch
#
# Jobs:
#   1. Dependency audit (bun audit + cargo audit)
#   2. Dockerfile scanning (Trivy config scan)
#   3. Container image scanning (Trivy image scan)
#   4. Rust dependency audit (cargo-audit)

name: Security Audit

on:
  schedule:
    # Daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  push:
    branches: [main]
    paths:
      - 'package.json'
      - 'bun.lockb'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/Dockerfile*'
      - 'deploy/docker/**'
      - '.github/workflows/security-audit.yml'
  pull_request:
    paths:
      - 'package.json'
      - 'bun.lockb'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/Dockerfile*'
      - 'deploy/docker/**'
  workflow_dispatch:

concurrency:
  group: security-audit-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.5"

jobs:
  # ─── JavaScript/TypeScript Dependency Audit ─────────────────
  dependency-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Audit JS dependencies (critical)
        run: bun audit --audit-level=critical

      - name: Audit JS dependencies (all severities — informational)
        run: bun audit || true
        continue-on-error: true

  # ─── Rust Dependency Audit ─────────────────────────────────
  rust-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@efa25f7f19611383d5b0ccf2d1c8914531636bf9 # stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Rust dependencies (packages/crypto)
        working-directory: packages/crypto
        run: cargo audit

      - name: Audit Rust dependencies (apps/desktop)
        working-directory: apps/desktop
        run: cargo audit
        continue-on-error: true  # May fail if desktop Cargo.lock is not committed

  # ─── Dockerfile Security Scanning ──────────────────────────
  dockerfile-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Scan Dockerfile.build with Trivy
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7f3b01b8e110e21 # v0.28.0
        with:
          scan-type: 'config'
          scan-ref: 'Dockerfile.build'
          format: 'sarif'
          output: 'dockerfile-build-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Scan deploy/docker/Dockerfile with Trivy
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7f3b01b8e110e21 # v0.28.0
        with:
          scan-type: 'config'
          scan-ref: 'deploy/docker/Dockerfile'
          format: 'sarif'
          output: 'dockerfile-deploy-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Scan Docker Compose files with Trivy
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7f3b01b8e110e21 # v0.28.0
        with:
          scan-type: 'config'
          scan-ref: 'deploy/docker'
          format: 'sarif'
          output: 'docker-compose-results.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'

      - name: Upload Dockerfile.build scan results
        uses: github/codeql-action/upload-sarif@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3
        if: always()
        with:
          sarif_file: 'dockerfile-build-results.sarif'
          category: 'dockerfile-build'

      - name: Upload deploy Dockerfile scan results
        uses: github/codeql-action/upload-sarif@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3
        if: always()
        with:
          sarif_file: 'dockerfile-deploy-results.sarif'
          category: 'dockerfile-deploy'

      - name: Upload Docker Compose scan results
        uses: github/codeql-action/upload-sarif@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3
        if: always()
        with:
          sarif_file: 'docker-compose-results.sarif'
          category: 'docker-compose'

  # ─── Container Image Vulnerability Scan ────────────────────
  image-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      packages: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: app
            dockerfile: deploy/docker/Dockerfile
            context: .
          - name: build
            dockerfile: Dockerfile.build
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Build image for scanning
        uses: docker/build-push-action@263435318d21b8e681c14492fe198571cfb76f00 # v6.12.0
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          push: false
          load: true
          tags: llamenos-scan:latest
          cache-from: type=gha

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7f3b01b8e110e21 # v0.28.0
        with:
          image-ref: 'llamenos-scan:latest'
          format: 'sarif'
          output: 'image-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload image scan results
        uses: github/codeql-action/upload-sarif@45580472a5bb82c4681c4ac726cfdb60060c2ee1 # v3
        if: always()
        with:
          sarif_file: 'image-results.sarif'
          category: 'image-scan'

      - name: Scan image with Trivy (table output for review)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947e7f3b01b8e110e21 # v0.28.0
        with:
          image-ref: 'llamenos-scan:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
