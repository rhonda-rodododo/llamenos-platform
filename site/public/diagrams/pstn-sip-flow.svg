<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 580" fill="none">
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; fill: #e8e8e8; }
    .node { rx: 8; ry: 8; }
    .label { font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sublabel { font-size: 10px; fill: #a0d0cf; text-anchor: middle; }
    .arrow { stroke: #51AFAE; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#51AFAE"/>
    </marker>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D9B9B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a6b6b" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="hlGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#51AFAE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2D9B9B" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Caller -->
  <rect x="95" y="10" width="230" height="45" class="node" fill="url(#nodeGrad)" stroke="#51AFAE" stroke-width="2"/>
  <text x="210" y="30" class="label">📞 Caller dials PSTN number</text>
  <text x="210" y="46" class="sublabel">Standard phone call</text>

  <line x1="210" y1="55" x2="210" y2="90" class="arrow"/>

  <!-- SIP trunk -->
  <rect x="60" y="90" width="300" height="55" class="node" fill="url(#hlGrad)" stroke="#5BC5C5" stroke-width="2.5"/>
  <text x="210" y="113" class="label" style="fill: #fff;">SIP trunk terminates at YOUR server</text>
  <text x="210" y="133" class="sublabel" style="fill: #c0e8e8;">Telnyx CDR-free · SignalWire · self-hosted</text>

  <line x1="210" y1="145" x2="210" y2="180" class="arrow"/>

  <!-- SIP bridge -->
  <rect x="60" y="180" width="300" height="55" class="node" fill="url(#hlGrad)" stroke="#5BC5C5" stroke-width="2.5"/>
  <text x="210" y="203" class="label" style="fill: #fff;">Llámenos SIP bridge</text>
  <text x="210" y="223" class="sublabel" style="fill: #c0e8e8;">Asterisk · FreeSWITCH · Kamailio</text>

  <line x1="210" y1="235" x2="210" y2="270" class="arrow"/>

  <!-- Parallel ring -->
  <rect x="60" y="270" width="300" height="55" class="node" fill="url(#hlGrad)" stroke="#5BC5C5" stroke-width="2.5"/>
  <text x="210" y="293" class="label" style="fill: #fff;">Parallel ring</text>
  <text x="210" y="313" class="sublabel" style="fill: #c0e8e8;">ALL on-shift volunteers simultaneously</text>

  <line x1="210" y1="325" x2="210" y2="360" class="arrow"/>

  <!-- First pickup -->
  <rect x="55" y="360" width="310" height="75" class="node" fill="url(#hlGrad)" stroke="#5BC5C5" stroke-width="2.5"/>
  <text x="210" y="385" class="label" style="fill: #fff;">First volunteer picks up</text>
  <text x="210" y="403" class="sublabel" style="fill: #c0e8e8;">↳ Others hang up automatically</text>
  <text x="210" y="418" class="sublabel" style="fill: #c0e8e8;">↳ Caller is connected</text>
  <text x="210" y="430" class="sublabel" style="fill: #c0e8e8;">↳ Volunteer logs encrypted notes</text>

  <line x1="210" y1="435" x2="210" y2="470" class="arrow"/>

  <!-- Encrypted notes -->
  <rect x="80" y="470" width="260" height="55" class="node" fill="#51AFAE" fill-opacity="0.3" stroke="#51AFAE" stroke-width="2.5"/>
  <text x="210" y="495" class="label" style="fill: #fff;">🔒 Encrypted notes stored</text>
  <text x="210" y="515" class="sublabel" style="fill: #c0e8e8;">Server is a blind relay</text>
</svg>
