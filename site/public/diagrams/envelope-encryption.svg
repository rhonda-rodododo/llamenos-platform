<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 430 560" fill="none">
  <style>
    text { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; fill: #e8e8e8; }
    .node { rx: 8; ry: 8; }
    .label { font-size: 13px; font-weight: 600; text-anchor: middle; }
    .sublabel { font-size: 10px; fill: #a0d0cf; text-anchor: middle; }
    .arrow { stroke: #51AFAE; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#51AFAE"/>
    </marker>
    <linearGradient id="nodeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D9B9B" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a6b6b" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="hlGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#51AFAE" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#2D9B9B" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="warnGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ae5151" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b3a3a" stop-opacity="0.35"/>
    </linearGradient>
  </defs>

  <!-- Inbound message -->
  <rect x="90" y="10" width="250" height="45" class="node" fill="url(#nodeGrad)" stroke="#51AFAE" stroke-width="2"/>
  <text x="215" y="30" class="label">📨 Inbound message arrives</text>
  <text x="215" y="46" class="sublabel">at webhook endpoint</text>

  <line x1="215" y1="55" x2="215" y2="90" class="arrow"/>

  <!-- Random key -->
  <rect x="60" y="90" width="310" height="55" class="node" fill="url(#hlGrad)" stroke="#5BC5C5" stroke-width="2.5"/>
  <text x="215" y="113" class="label" style="fill: #fff;">Generate random message_key</text>
  <text x="215" y="133" class="sublabel" style="fill: #c0e8e8;">random_bytes(32) — unique per message</text>

  <line x1="215" y1="145" x2="215" y2="180" class="arrow"/>

  <!-- Encrypt -->
  <rect x="50" y="180" width="330" height="55" class="node" fill="url(#hlGrad)" stroke="#5BC5C5" stroke-width="2.5"/>
  <text x="215" y="203" class="label" style="fill: #fff;">Encrypt plaintext</text>
  <text x="215" y="223" class="sublabel" style="fill: #c0e8e8;">XChaCha20-Poly1305(message_key, nonce)</text>

  <line x1="215" y1="235" x2="215" y2="270" class="arrow"/>

  <!-- HPKE wrap -->
  <rect x="40" y="270" width="350" height="55" class="node" fill="url(#hlGrad)" stroke="#5BC5C5" stroke-width="2.5"/>
  <text x="215" y="293" class="label" style="fill: #fff;">HPKE-wrap message_key</text>
  <text x="215" y="313" class="sublabel" style="fill: #c0e8e8;">for: assigned volunteer + all admins</text>

  <line x1="215" y1="325" x2="215" y2="360" class="arrow"/>

  <!-- Store -->
  <rect x="55" y="360" width="320" height="55" class="node" fill="#51AFAE" fill-opacity="0.3" stroke="#51AFAE" stroke-width="2.5"/>
  <text x="215" y="383" class="label" style="fill: #fff;">🔒 Store ciphertext + envelopes</text>
  <text x="215" y="403" class="sublabel" style="fill: #c0e8e8;">{ ciphertext, readerEnvelopes[] }</text>

  <line x1="215" y1="415" x2="215" y2="450" class="arrow"/>

  <!-- Discard -->
  <rect x="70" y="450" width="290" height="45" class="node" fill="url(#warnGrad)" stroke="#d97070" stroke-width="2"/>
  <text x="215" y="470" class="label" style="fill: #ffb0b0;">🗑️ Discard plaintext immediately</text>
  <text x="215" y="487" class="sublabel" style="fill: #d0a0a0;">from memory — zero retention</text>

  <line x1="215" y1="495" x2="215" y2="520" class="arrow" style="stroke: #6b9b9b;"/>

  <!-- Result -->
  <text x="215" y="540" class="label" style="fill: #8ec8c8; font-size: 12px; font-style: italic;">Server cannot read stored messages</text>
</svg>
